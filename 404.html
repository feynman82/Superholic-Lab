<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oops! Page Not Found — Superholic Lab</title>
  <meta name="robots" content="noindex" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/favicon.ico" />

  <script src="js/header.js" defer></script>
  <script src="js/footer.js" defer></script>

  <style>
    /* Playful Design Overrides & Animations */
    .lost-container {
      min-height: calc(100vh - 140px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) 20px;
      background: var(--bg-page, #FAFAF9);
    }

    .lost-image {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 50%;
      border: 6px solid var(--brand-sage);
      box-shadow: 0 12px 32px rgba(81, 97, 94, 0.15);
      margin-bottom: var(--space-6);
      /* The Playful Float Animation */
      animation: float 4s ease-in-out infinite;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: 8rem;
      font-weight: 900;
      color: var(--brand-rose);
      line-height: 0.9;
      margin-bottom: var(--space-2);
      text-shadow: 4px 4px 0px rgba(183, 110, 121, 0.15);
    }

    .error-title {
      font-family: var(--font-body);
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: var(--space-4);
    }

    .error-subtext {
      font-family: var(--font-body);
      font-size: 1.125rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto var(--space-8);
      line-height: 1.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }
  </style>
</head>
<body>

  <global-header></global-header>

  <main class="lost-container text-center">
    
    <img 
      src="assets/images/404.png?q=80&w=600&auto=format&fit=crop" alt="A cute confused dog looking for the page" class="lost-image"/>
    <div class="error-code" aria-hidden="true">404</div>
    <h1 class="error-title">Oops! The page ran away.</h1>
    
    <p class="error-subtext">
      We looked under the desks and checked all the backpacks, but we just can't find the page you're looking for. It might have taken a field trip!
    </p>

    <div class="flex gap-4" style="justify-content: center; flex-wrap: wrap;">
      <a href="index.html" class="btn btn-primary" style="font-size: 1.1rem; padding: 12px 24px;">
        🏠 Take Me Home
      </a>
      <a href="pages/subjects.html" class="btn btn-secondary" style="font-size: 1.1rem; padding: 12px 24px;">
        📚 Choose a Subject
      </a>
    </div>

  </main>

  <global-footer></global-footer>

</body>
</html>
