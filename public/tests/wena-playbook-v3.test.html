<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wena Playbook v3.0 — Sprint 7 Test Harness</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--sage-darker); color: var(--cream); font-family: var(--font-body); padding: var(--space-8) var(--space-4); min-height: 100vh; }
    .harness { max-width: 880px; margin: 0 auto; }
    h1 { font-family: var(--font-display); letter-spacing: 0.04em; margin-bottom: var(--space-2); }
    .subtitle { color: var(--sage-light); margin-bottom: var(--space-6); font-size: 0.875rem; }
    .summary { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4) var(--space-6); margin-bottom: var(--space-6); background: var(--glass); border: 1.5px solid var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: blur(12px); box-shadow: var(--shadow-neo); font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.04em; }
    .summary.is-pending { color: var(--cream-dim); }
    .summary.is-pass    { color: var(--mint); border-color: var(--mint); }
    .summary.is-fail    { color: var(--danger); border-color: var(--danger); }
    .summary .summary-dot { width: 12px; height: 12px; border-radius: var(--radius-full); background: currentColor; box-shadow: 0 0 8px currentColor; }
    .test-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--space-2); }
    .test-row { display: grid; grid-template-columns: 28px 1fr; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-md); align-items: start; }
    .test-row.is-pass { border-left: 3px solid var(--mint); }
    .test-row.is-fail { border-left: 3px solid var(--danger); }
    .test-row.is-pending { border-left: 3px solid var(--cream-dim); }
    .test-icon { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; line-height: 1.4; }
    .test-row.is-pass    .test-icon { color: var(--mint); }
    .test-row.is-fail    .test-icon { color: var(--danger); }
    .test-row.is-pending .test-icon { color: var(--cream-dim); }
    .test-name { font-weight: 600; font-size: 0.9375rem; line-height: 1.4; }
    .test-detail { margin-top: var(--space-1); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--sage-light); white-space: pre-wrap; word-break: break-word; }
    .test-row.is-fail .test-detail { color: var(--danger); }
  </style>
</head>
<body>
  <main class="harness">
    <h1>Wena Playbook v3.0 — Sprint 7 Test Harness</h1>
    <div class="subtitle">Multi-subject loader. v3.0 schema with subject|level|topic|sub_topic indexing. Backward-compat shim for legacy 3-arg callers.</div>
    <div id="summary" class="summary is-pending"><span class="summary-dot"></span><span id="summary-text">Running 0 / 10 …</span></div>
    <ol id="test-list" class="test-list"></ol>
  </main>
  <script type="module">
    import { loadPlaybook, getCell, getFallbackCell, getAllCells, getPlaybookMeta } from '/js/wena-playbook.js';

    const results = [];
    const listEl = document.getElementById('test-list');
    const sumEl = document.getElementById('summary');
    const sumTxt = document.getElementById('summary-text');
    function row(name) {
      const li = document.createElement('li'); li.className = 'test-row is-pending';
      const icon = document.createElement('span'); icon.className='test-icon'; icon.textContent='…';
      const body = document.createElement('div');
      const h = document.createElement('div'); h.className='test-name'; h.textContent=name;
      const d = document.createElement('div'); d.className='test-detail';
      body.appendChild(h); body.appendChild(d); li.appendChild(icon); li.appendChild(body); listEl.appendChild(li);
      return { li, icon, d };
    }
    function setS(r, s, t='') { r.li.classList.remove('is-pending','is-pass','is-fail'); r.li.classList.add(`is-${s}`); r.icon.textContent = s==='pass'?'✓':s==='fail'?'✗':'…'; if(t) r.d.textContent=t; }
    function update() { const p=results.filter(r=>r.s==='pass').length, f=results.filter(r=>r.s==='fail').length, t=results.length;
      sumTxt.textContent = `${p} / ${t} passed${f?` (${f} failed)`:''}`; sumEl.classList.remove('is-pending','is-pass','is-fail');
      if(f>0) sumEl.classList.add('is-fail'); else if(p===t) sumEl.classList.add('is-pass'); else sumEl.classList.add('is-pending'); }
    async function test(name, fn) { const r=row(name); const e={name,s:'pending'}; results.push(e);
      try { await fn(); e.s='pass'; setS(r,'pass','OK'); } catch(err) { e.s='fail'; setS(r,'fail',err?.message||String(err)); console.error(name,err); } finally { update(); } }
    function assert(c, m) { if(!c) throw new Error(m||'assert'); }
    function assertEq(a, b, l='value') { if(a!==b) throw new Error(`${l}: expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }

    (async () => {
      await test('TEST 1: getPlaybookMeta() reports schema=\"v3\" when v3.0 file present', async () => {
        await loadPlaybook();
        const meta = getPlaybookMeta();
        assertEq(meta.schema, 'v3');
        assertEq(meta.version, '3.0');
      });
      await test("TEST 2: getCell('English','P3','Grammar','Subject-Verb Agreement') returns subject=English", () => {
        const c = getCell('English', 'P3', 'Grammar', 'Subject-Verb Agreement');
        assert(c, 'cell not found');
        assertEq(c.subject, 'English');
      });
      await test("TEST 3: getCell('Science','P4','Energy','Sources Of Light') returns cer_structure", () => {
        const c = getCell('Science', 'P4', 'Energy', 'Sources Of Light');
        assert(c, 'cell not found');
        assertEq(c.subject, 'Science');
        assert(c.cer_structure?.claim_prompt, 'missing cer_structure.claim_prompt');
      });
      await test("TEST 4: getCell('Science','P1','Diversity','Living Things') returns null (P1 Science not authored)", () => {
        const c = getCell('Science', 'P1', 'Diversity', 'Living Things');
        assertEq(c, null);
      });
      await test('TEST 5: getAllCells(\"English\").length === 147', () => {
        assertEq(getAllCells('English').length, 147);
      });
      await test('TEST 6: getAllCells(\"Science\").length === 33', () => {
        assertEq(getAllCells('Science').length, 33);
      });
      await test('TEST 7: getAllCells().length === 180', () => {
        assertEq(getAllCells().length, 180);
      });
      await test("TEST 8: legacy 3-arg getCell('P3','Grammar','Conjunctions') returns English cell + warns", () => {
        // Capture console.warn for warning verification.
        let warned = false;
        const orig = console.warn;
        console.warn = (...args) => { if (String(args[0]||'').includes('Legacy 3-arg')) warned = true; orig.apply(console, args); };
        try {
          const c = getCell('P3', 'Grammar', 'Conjunctions');
          assert(c, 'legacy call returned null');
          assertEq(c.subject, 'English');
        } finally {
          console.warn = orig;
        }
        // Warning fires once per page; if a previous test already triggered it, this test only checks the result.
        // No assertion on warned flag — first-call is sufficient.
      });
      await test("TEST 9: getFallbackCell('Science','P4','Energy') returns any P4 Energy cell", () => {
        const c = getFallbackCell('Science', 'P4', 'Energy');
        assert(c);
        assertEq(c.subject, 'Science');
        assertEq(c.level, 'P4');
        assertEq(c.topic, 'Energy');
      });
      await test('TEST 10: every Science cell has CER-triple correct_answer; every English cell has string', () => {
        for (const c of getAllCells('Science')) {
          assert(typeof c.worked_example.correct_answer === 'object', `Science ${c.sub_topic} not object`);
          assert(c.worked_example.correct_answer.claim, `${c.sub_topic} missing claim`);
          assert(c.worked_example.correct_answer.evidence, `${c.sub_topic} missing evidence`);
          assert(c.worked_example.correct_answer.reasoning, `${c.sub_topic} missing reasoning`);
        }
        for (const c of getAllCells('English')) {
          assert(typeof c.worked_example.correct_answer === 'string', `English ${c.sub_topic} not string`);
        }
      });
      update();
    })();
  </script>
</body>
</html>
