<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wena CER Prompts — Sprint 7 Test Harness</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--sage-darker); color: var(--cream); font-family: var(--font-body); padding: var(--space-8) var(--space-4); min-height: 100vh; }
    .harness { max-width: 880px; margin: 0 auto; }
    h1 { font-family: var(--font-display); letter-spacing: 0.04em; margin-bottom: var(--space-2); }
    .subtitle { color: var(--sage-light); margin-bottom: var(--space-6); font-size: 0.875rem; }
    .summary { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4) var(--space-6); margin-bottom: var(--space-6); background: var(--glass); border: 1.5px solid var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: blur(12px); box-shadow: var(--shadow-neo); font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.04em; }
    .summary.is-pending { color: var(--cream-dim); }
    .summary.is-pass    { color: var(--mint); border-color: var(--mint); }
    .summary.is-fail    { color: var(--danger); border-color: var(--danger); }
    .summary .summary-dot { width: 12px; height: 12px; border-radius: var(--radius-full); background: currentColor; box-shadow: 0 0 8px currentColor; }
    h3.section-heading { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mint); margin: var(--space-6) 0 var(--space-2); padding: var(--space-2) var(--space-3); background: var(--glass); border-left: 3px solid var(--mint); border-radius: var(--radius-sm); }
    h3.section-heading:first-of-type { margin-top: 0; }
    .test-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--space-2); }
    .test-row { display: grid; grid-template-columns: 28px 1fr; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-md); align-items: start; }
    .test-row.is-pass { border-left: 3px solid var(--mint); }
    .test-row.is-fail { border-left: 3px solid var(--danger); }
    .test-row.is-pending { border-left: 3px solid var(--cream-dim); }
    .test-icon { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; line-height: 1.4; }
    .test-row.is-pass    .test-icon { color: var(--mint); }
    .test-row.is-fail    .test-icon { color: var(--danger); }
    .test-row.is-pending .test-icon { color: var(--cream-dim); }
    .test-name { font-weight: 600; font-size: 0.9375rem; line-height: 1.4; }
    .test-detail { margin-top: var(--space-1); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--sage-light); white-space: pre-wrap; word-break: break-word; }
    .test-row.is-fail .test-detail { color: var(--danger); }
  </style>
</head>
<body>
  <main class="harness">
    <h1>Wena CER Prompts — Sprint 7 Test Harness</h1>
    <div class="subtitle">Science persona, 3 CER probe modes, Science DIRECT_TEACH/CHECK_RESPONSE variants. PROMPT_VERSION = wena-rap-1.1.0.</div>
    <div id="summary" class="summary is-pending"><span class="summary-dot"></span><span id="summary-text">Running 0 / 12 …</span></div>
    <div id="sections"></div>
  </main>
  <script type="module">
    import { buildWenaSystemPrompt, PROMPT_VERSION } from '/js/wena-prompts.js';
    import { loadPlaybook, getCell } from '/js/wena-playbook.js';

    const results = [];
    const sumEl = document.getElementById('summary');
    const sumTxt = document.getElementById('summary-text');
    const sectionsEl = document.getElementById('sections');
    let currentList = null;
    function startSection(label) {
      const h = document.createElement('h3'); h.className='section-heading'; h.textContent = label;
      sectionsEl.appendChild(h);
      const ol = document.createElement('ol'); ol.className='test-list'; sectionsEl.appendChild(ol); currentList = ol;
    }
    function row(name) {
      const li = document.createElement('li'); li.className='test-row is-pending';
      const icon = document.createElement('span'); icon.className='test-icon'; icon.textContent='…';
      const body = document.createElement('div');
      const h = document.createElement('div'); h.className='test-name'; h.textContent=name;
      const d = document.createElement('div'); d.className='test-detail';
      body.appendChild(h); body.appendChild(d); li.appendChild(icon); li.appendChild(body); currentList.appendChild(li);
      return { li, icon, d };
    }
    function setS(r,s,t='') { r.li.classList.remove('is-pending','is-pass','is-fail'); r.li.classList.add(`is-${s}`); r.icon.textContent = s==='pass'?'✓':s==='fail'?'✗':'…'; if(t) r.d.textContent=t; }
    function update() { const p=results.filter(r=>r.s==='pass').length, f=results.filter(r=>r.s==='fail').length, t=results.length;
      sumTxt.textContent = `${p} / ${t} passed${f?` (${f} failed)`:''}`; sumEl.classList.remove('is-pending','is-pass','is-fail');
      if(f>0) sumEl.classList.add('is-fail'); else if(p===t) sumEl.classList.add('is-pass'); else sumEl.classList.add('is-pending'); }
    function test(name, fn) { const r=row(name); const e={name,s:'pending'}; results.push(e);
      try { fn(); e.s='pass'; setS(r,'pass','OK'); } catch(err) { e.s='fail'; setS(r,'fail',err?.message||String(err)); console.error(name,err); } finally { update(); } }
    function assert(c, m) { if(!c) throw new Error(m||'assert'); }

    (async () => {
      await loadPlaybook();
      const sciCell = getCell('Science', 'P4', 'Energy', 'Sources Of Light');
      const engCell = getCell('English', 'P3', 'Grammar', 'Conjunctions');
      assert(sciCell && engCell, 'fixture cells missing');

      startSection('PERSONA');
      test('TEST 1: Science cell + buildWenaSystemPrompt → output contains "CER move"', () => {
        const out = buildWenaSystemPrompt({ mode:'SOCRATIC', cell: sciCell, level: 'P4' });
        assert(out.includes('CER move'), 'missing CER move addendum');
      });
      test('TEST 2: English cell → output does NOT contain "CER" (or "Claim:")', () => {
        const out = buildWenaSystemPrompt({ mode:'SOCRATIC', cell: engCell, level: 'P3' });
        assert(!out.includes('CER move'), 'leaked CER addendum into English persona');
        assert(!/\bClaim:/.test(out), 'leaked Claim: label into English SOCRATIC');
      });

      startSection('CER_PROBE_CLAIM');
      test('TEST 3: output contains cell.cer_structure.claim_prompt verbatim', () => {
        const out = buildWenaSystemPrompt({ mode:'CER_PROBE_CLAIM', cell: sciCell, level: 'P4' });
        assert(out.includes(sciCell.cer_structure.claim_prompt), 'claim_prompt not injected');
      });
      test('TEST 4: output does NOT contain "evidence" / "reasoning" task instructions', () => {
        const out = buildWenaSystemPrompt({ mode:'CER_PROBE_CLAIM', cell: sciCell, level: 'P4' });
        // Allow appearance in persona addendum but not in TASK section. Cheap proxy: TASK section starts with "TASK".
        const taskBlock = out.split('TASK')[1] || '';
        assert(!/\bevidence\b/i.test(taskBlock), 'TASK leaked evidence');
        assert(!/\breasoning\b/i.test(taskBlock), 'TASK leaked reasoning');
      });

      startSection('CER_PROBE_EVIDENCE');
      test('TEST 5: output contains cell.cer_structure.evidence_prompt', () => {
        const out = buildWenaSystemPrompt({ mode:'CER_PROBE_EVIDENCE', cell: sciCell, level: 'P4' });
        assert(out.includes(sciCell.cer_structure.evidence_prompt), 'evidence_prompt not injected');
      });
      test('TEST 6: output explicitly tells model NOT to correct claim yet', () => {
        const out = buildWenaSystemPrompt({ mode:'CER_PROBE_EVIDENCE', cell: sciCell, level: 'P4' });
        assert(/do NOT correct/i.test(out) || /Just ask what they observed/i.test(out), 'no anti-correction guidance');
      });

      startSection('CER_PROBE_REASONING');
      test('TEST 7: output contains cell.cer_structure.reasoning_prompt', () => {
        const out = buildWenaSystemPrompt({ mode:'CER_PROBE_REASONING', cell: sciCell, level: 'P4' });
        assert(out.includes(sciCell.cer_structure.reasoning_prompt), 'reasoning_prompt not injected');
      });

      startSection('DIRECT_TEACH (Science)');
      test('TEST 8: output contains all 3 parts of worked_example.correct_answer (CER labels)', () => {
        const out = buildWenaSystemPrompt({ mode:'DIRECT_TEACH', cell: sciCell, level: 'P4' });
        assert(out.includes(sciCell.worked_example.correct_answer.claim), 'missing claim');
        assert(out.includes(sciCell.worked_example.correct_answer.evidence), 'missing evidence');
        assert(out.includes(sciCell.worked_example.correct_answer.reasoning), 'missing reasoning');
      });
      test('TEST 9: output contains "Claim:", "Evidence:", "Reasoning:" as section labels', () => {
        const out = buildWenaSystemPrompt({ mode:'DIRECT_TEACH', cell: sciCell, level: 'P4' });
        assert(/\bClaim:/.test(out), 'missing Claim: label');
        assert(/\bEvidence:/.test(out), 'missing Evidence: label');
        assert(/\bReasoning:/.test(out), 'missing Reasoning: label');
      });

      startSection('DIRECT_TEACH (English)');
      test('TEST 10: English output unchanged from Sprint 3 — no CER labelling', () => {
        const out = buildWenaSystemPrompt({ mode:'DIRECT_TEACH', cell: engCell, level: 'P3' });
        assert(!/\bClaim:/.test(out), 'English leaked Claim: label');
        assert(!/\bEvidence:/.test(out), 'English leaked Evidence: label');
        assert(!/\bReasoning:/.test(out), 'English leaked Reasoning: label');
        assert(out.includes('The correct answer is'), 'English DIRECT_TEACH lost Sprint 3 phrasing');
      });

      startSection('CHECK_RESPONSE (Science)');
      test('TEST 11: Science CHECK_RESPONSE references all 3 expected_answer fields', () => {
        const out = buildWenaSystemPrompt({
          mode: 'CHECK_RESPONSE',
          cell: sciCell,
          level: 'P4',
          lastUserMessage: 'It glows so it is a source',
          checkQuestionAsked: sciCell.check_for_understanding.question
        });
        assert(out.includes(sciCell.check_for_understanding.expected_answer.claim), 'missing expected claim');
        assert(out.includes(sciCell.check_for_understanding.expected_answer.evidence), 'missing expected evidence');
        assert(out.includes(sciCell.check_for_understanding.expected_answer.reasoning), 'missing expected reasoning');
      });
      test('TEST 12: Science CHECK_RESPONSE handles partial-credit (2 of 3, 1 of 3) cases', () => {
        const out = buildWenaSystemPrompt({
          mode: 'CHECK_RESPONSE',
          cell: sciCell,
          level: 'P4',
          lastUserMessage: 'It glows so it is a source',
          checkQuestionAsked: sciCell.check_for_understanding.question
        });
        assert(/2 of 3/i.test(out), 'no 2-of-3 handling');
        assert(/1 of 3/i.test(out) || /1 of 3 or none/i.test(out), 'no 1-of-3 handling');
      });

      update();
    })();
  </script>
</body>
</html>
