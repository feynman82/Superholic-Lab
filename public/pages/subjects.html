<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Subject — Superholic Lab</title>
  <meta name="description" content="Choose a subject and topic to start practising MOE-aligned questions." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/subjects.css" />
  <link rel="icon" href="../assets/favicon.ico" />

  <script src="/js/header.js" defer></script>
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  <script src="/js/footer.js" defer></script>
  <script src="/js/icons.js" defer></script>
  <script src="/js/bottom-nav.js" defer></script>
  <script src="../js/supabase-client.js"></script>
  <script type="module" src="../js/subjects.js"></script>
</head>

<body id="mainBody" class="has-bottom-nav subjects-page">

  <global-header></global-header>

  <!-- ═══════════════════ MAIN WIZARD APP ═══════════════════ -->
  <main id="app" class="container-as flex flex-col items-center w-full"
    style="padding-top: calc(64px + var(--space-8)); min-height: 80vh;">
  </main>

  <!-- ─── Sub-topic popover (floating dialog, controlled by render()) ─── -->
  <div id="subtopic-pop-scrim" class="subtopic-pop-scrim" aria-hidden="true"
       onclick="window.closeSubTopicPopover()"></div>
  <div id="subtopic-pop-host" class="subtopic-pop" role="dialog"
       aria-modal="true" aria-labelledby="subtopic-pop-title" aria-hidden="true"></div>

  <global-footer></global-footer>
  <global-bottom-nav></global-bottom-nav>
</body>

</html>
