<!-- Superholic Lab v0.1 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superholic Lab — Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #4338ca;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .subheading {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-style: italic;
      opacity: 0.9;
      margin-bottom: 1.75rem;
    }

    .body-text {
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 0.75rem;
    }

    .domain {
      font-size: 0.85rem;
      opacity: 0.6;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .pill {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .pill:hover {
      background-color: rgba(255, 255, 255, 0.15);
      border-color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Superholic Lab</h1>
    <p class="subheading">Learn like a champion. Think like a winner.</p>
    <p class="body-text">Singapore's AI-powered learning platform for Primary 1 to Secondary 4. Launching soon.</p>
    <p class="domain">www.superholiclab.com</p>
    <nav class="links">
      <a class="pill" href="/quiz/index.html">Quiz Demo</a>
      <a class="pill" href="/countdown-timer/index.html">Countdown</a>
    </nav>
  </div>
</body>
</html>
