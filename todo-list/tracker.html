<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superholic Lab — Content Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #2d1060 50%, #1a0533 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      color: #fff;
    }

    .brand {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 6px;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 700;
      color: #f0e6ff;
      margin-bottom: 36px;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(192, 132, 252, 0.25);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 580px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      color: #f0e6ff;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder {
      color: rgba(192, 132, 252, 0.5);
    }

    input[type="text"]:focus {
      border-color: #a855f7;
    }

    .btn-add {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .btn-add:hover {
      background: #6d28d9;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(192, 132, 252, 0.15);
      border-radius: 10px;
      padding: 12px 14px;
      transition: background 0.15s;
    }

    .task-item:hover {
      background: rgba(192, 132, 252, 0.08);
    }

    .task-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 2px solid #7c3aed;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-item input[type="checkbox"]:checked {
      background: #7c3aed;
      border-color: #7c3aed;
    }

    .task-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #e9d5ff;
      word-break: break-word;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: rgba(192, 132, 252, 0.45);
    }

    .btn-delete {
      background: none;
      border: none;
      color: rgba(192, 132, 252, 0.35);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }

    .btn-delete:hover {
      color: #f87171;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(192, 132, 252, 0.15);
    }

    .task-count {
      font-size: 0.8rem;
      color: rgba(192, 132, 252, 0.6);
    }

    .btn-clear {
      background: none;
      border: 1px solid rgba(192, 132, 252, 0.3);
      border-radius: 8px;
      padding: 6px 14px;
      color: rgba(192, 132, 252, 0.7);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      border-color: #f87171;
      color: #f87171;
    }

    .empty {
      text-align: center;
      color: rgba(192, 132, 252, 0.4);
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>

  <div class="brand">Superholic Lab</div>
  <h1>Content Tracker</h1>

  <div class="card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task and press Enter…" />
      <button class="btn-add" id="addBtn" title="Add task">+</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="footer">
      <span class="task-count" id="taskCount"></span>
      <button class="btn-clear" id="clearBtn">Clear completed</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'superholic_tasks';

    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('taskList');
      const count = document.getElementById('taskCount');

      list.innerHTML = '';

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty">No tasks yet. Add one above.</p>';
      } else {
        tasks.forEach((task, i) => {
          const item = document.createElement('div');
          item.className = 'task-item' + (task.done ? ' done' : '');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.done;
          checkbox.addEventListener('change', () => {
            tasks[i].done = checkbox.checked;
            save();
            render();
          });

          const text = document.createElement('span');
          text.className = 'task-text';
          text.textContent = task.text;

          const del = document.createElement('button');
          del.className = 'btn-delete';
          del.textContent = '×';
          del.title = 'Delete task';
          del.addEventListener('click', () => {
            tasks.splice(i, 1);
            save();
            render();
          });

          item.appendChild(checkbox);
          item.appendChild(text);
          item.appendChild(del);
          list.appendChild(item);
        });
      }

      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      count.textContent = total === 0 ? '' : `${done} of ${total} completed`;
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    document.getElementById('addBtn').addEventListener('click', addTask);

    document.getElementById('clearBtn').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>

</body>
</html>
