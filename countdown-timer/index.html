<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singapore PSLE 2026 Countdown — Superholic Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }

    .brand {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #16a34a;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: #166534;
      margin-bottom: 48px;
      text-align: center;
    }

    .countdown {
      display: flex;
      gap: clamp(12px, 3vw, 32px);
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 16px;
      padding: clamp(16px, 3vw, 28px) clamp(20px, 4vw, 40px);
      min-width: clamp(70px, 18vw, 110px);
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.1);
    }

    .number {
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      font-weight: 800;
      color: #15803d;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .label {
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ca8a04;
      margin-top: 8px;
    }

    .message {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #ca8a04;
      text-align: center;
      font-style: italic;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .target-date {
      font-size: 0.8rem;
      color: #86efac;
      letter-spacing: 0.05em;
      color: #16a34a;
    }

    .done-message {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      color: #15803d;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand">Superholic Lab</div>
  <h1>Singapore PSLE 2026 Countdown</h1>

  <div class="countdown" id="countdown">
    <div class="unit">
      <span class="number" id="days">--</span>
      <span class="label">Days</span>
    </div>
    <div class="unit">
      <span class="number" id="hours">--</span>
      <span class="label">Hours</span>
    </div>
    <div class="unit">
      <span class="number" id="minutes">--</span>
      <span class="label">Minutes</span>
    </div>
    <div class="unit">
      <span class="number" id="seconds">--</span>
      <span class="label">Seconds</span>
    </div>
  </div>

  <p class="message">Every day of practice counts.</p>
  <p class="target-date">Target: 1 October 2026</p>

  <script>
    const target = new Date('2026-10-01T00:00:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML =
          '<p class="done-message">You\'ve made it. Good luck! 🎉</p>';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent    = days;
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
