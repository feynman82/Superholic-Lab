<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Free Trial — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- Analytics: ⚠️ CONFIGURE — sign up at plausible.io and add superholiclab.com -->
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
</head>
<body>
  <header class="navbar is-scrolled">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="8" fill="#4338ca"/>
            <path d="M8 14.5L12.5 19L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Superholic Lab
        </a>
        <div class="navbar-actions">
          <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
        </div>
      </nav>
    </div>
  </header>

  <main style="min-height:calc(100vh - 66px); display:flex; align-items:center; padding: var(--space-8) 0; background: linear-gradient(135deg, var(--primary-light) 0%, var(--surface) 100%);">
    <div class="container">
      <div class="card no-hover animate-in" style="max-width:460px; margin:0 auto;">
        <div class="card-header text-center">
          <span class="badge badge-success" style="margin-bottom:var(--space-3);">7-day free trial · No credit card</span>
          <h1 style="font-size:1.5rem;">Start your free trial</h1>
          <p class="text-secondary text-sm mt-4">Join Singapore families already practising with Superholic Lab</p>
        </div>
        <div class="card-body">

          <div id="signup-error" class="alert alert-danger" hidden role="alert"></div>
          <div id="signup-success" class="alert alert-info" hidden role="status"></div>

          <form id="signup-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="signup-name">Your name (parent)</label>
              <input
                type="text"
                id="signup-name"
                class="form-input"
                placeholder="e.g. Sarah Tan"
                autocomplete="name"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-email">Email address</label>
              <input
                type="email"
                id="signup-email"
                class="form-input"
                placeholder="hello@example.com"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-password">Password</label>
              <input
                type="password"
                id="signup-password"
                class="form-input"
                placeholder="At least 8 characters"
                autocomplete="new-password"
                minlength="8"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-confirm">Confirm password</label>
              <input
                type="password"
                id="signup-confirm"
                class="form-input"
                placeholder="Repeat your password"
                autocomplete="new-password"
                required
              />
            </div>

            <div class="form-group" style="display:flex; align-items:flex-start; gap:var(--space-3);">
              <input type="checkbox" id="signup-terms" style="margin-top:3px; flex-shrink:0;" required />
              <label for="signup-terms" style="font-size:0.875rem; color:var(--text-secondary); cursor:pointer;">
                I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and
                <a href="privacy.html" target="_blank">Privacy Policy</a>. I understand my child's
                data is protected under Singapore's PDPA.
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4" id="signup-btn">
              Start Free Trial
            </button>
          </form>

          <p class="text-center text-sm text-secondary mt-6">
            Already have an account? <a href="login.html">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. All rights reserved. 🇸🇬 Made in Singapore</p>
        <div class="flex gap-4">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      const form        = document.getElementById('signup-form');
      const nameEl      = document.getElementById('signup-name');
      const emailEl     = document.getElementById('signup-email');
      const passEl      = document.getElementById('signup-password');
      const confirmEl   = document.getElementById('signup-confirm');
      const termsEl     = document.getElementById('signup-terms');
      const errorEl     = document.getElementById('signup-error');
      const successEl   = document.getElementById('signup-success');
      const submitBtn   = document.getElementById('signup-btn');

      // Redirect already-logged-in users
      document.addEventListener('DOMContentLoaded', async () => {
        const user = await getCurrentUser();
        if (user) {
          window.location.href = '../pages/dashboard.html';
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.hidden   = true;
        successEl.hidden = true;

        const fullName = nameEl.value.trim();
        const email    = emailEl.value.trim();
        const password = passEl.value;
        const confirm  = confirmEl.value;

        // Client-side validation
        if (!fullName) {
          showError('Please enter your name.'); nameEl.focus(); return;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.'); emailEl.focus(); return;
        }
        if (password.length < 8) {
          showError('Password must be at least 8 characters.'); passEl.focus(); return;
        }
        if (password !== confirm) {
          showError('Passwords do not match.'); confirmEl.focus(); return;
        }
        if (!termsEl.checked) {
          showError('Please accept the Terms of Service and Privacy Policy to continue.');
          return;
        }

        setLoading(true);
        const { user, session, error } = await signUp(email, password, fullName);
        setLoading(false);

        if (error) {
          showError(friendlyError(error));
          return;
        }

        if (session) {
          // Immediately signed in — go to dashboard
          window.location.href = '../pages/dashboard.html';
        } else {
          // Email confirmation required
          form.hidden = true;
          successEl.hidden = false;
          successEl.textContent =
            'Account created! Check your inbox and click the confirmation link to activate your trial.';
        }
      });

      function setLoading(on) {
        submitBtn.disabled    = on;
        submitBtn.textContent = on ? 'Creating account…' : 'Start Free Trial';
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.hidden      = false;
        errorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function friendlyError(msg) {
        if (/already registered/i.test(msg) || /already been registered/i.test(msg)) {
          return 'An account with this email already exists. Try logging in instead.';
        }
        if (/password.*characters/i.test(msg)) {
          return 'Password must be at least 8 characters.';
        }
        return msg;
      }
    })();
  </script>
</body>
</html>
