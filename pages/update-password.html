<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Password — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
</head>

<body class="bg-page texture-light-grid flex items-center justify-center" style="min-height: 100vh; padding: var(--space-4);">

  <main class="card p-8 w-full hover-lift" style="max-width: 420px; background: var(--bg-surface);">
    
    <!-- Logo & Header -->
    <div class="flex flex-col items-center text-center mb-6">
      <!-- Dark Sage Banner for Logo Contrast -->
      <div class="w-full bg-sage-dark mb-6 py-3 flex justify-center items-center" style="border-radius: var(--radius-md); border-bottom: 3px solid var(--brand-rose);">
        <a href="../index.html" class="flex items-center gap-2 font-display text-2xl text-white" style="text-decoration: none;">
          <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius: var(--radius-sm); flex-shrink:0;">
          Superholic Lab
        </a>
      </div>
      
      <h1 class="font-display text-3xl text-main mb-2">Secure Your Account</h1>
      <p class="text-sm text-muted">Enter a strong new password below.</p>
    </div>

    <!-- Alert Box -->
    <div id="statusMsg" class="mb-4 p-3 text-sm font-bold rounded" style="display: none;"></div>

    <!-- Password Update Form -->
    <div id="updateForm" class="flex flex-col gap-4 mb-6">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-bold text-muted" for="newPassword">New Password</label>
        <input class="form-input" type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-bold text-muted" for="confirmPassword">Confirm New Password</label>
        <input class="form-input" type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary w-full hover-lift mt-2" id="updateBtn" onclick="handleUpdatePassword()">Update Password</button>
    </div>

    <!-- Success State (Hidden initially) -->
    <div id="successState" class="flex flex-col gap-4 hidden">
      <a href="dashboard.html" class="btn btn-primary w-full hover-lift">Go to Dashboard →</a>
    </div>

  </main>

  <script src="/js/supabase-client.js"></script>
  <script>
    function showMessage(msg, isSuccess = false) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.style.display = 'block';
      
      if (isSuccess) {
        el.style.background = 'rgba(5, 150, 105, 0.1)';
        el.style.border = '1px solid rgba(5, 150, 105, 0.2)';
        el.style.color = 'var(--brand-mint)';
      } else {
        el.style.background = 'rgba(220, 38, 38, 0.1)';
        el.style.border = '1px solid rgba(220, 38, 38, 0.2)';
        el.style.color = 'var(--brand-error)';
      }
    }
 
    // On page load, verify that the user successfully clicked the link
    // and that Supabase established a secure session from the URL hash.
    document.addEventListener('DOMContentLoaded', async () => {
      const sb = await getSupabase();
      
      // Supabase automatically parses the tokens in the URL when it loads.
      // We just need to check if it resulted in a valid session.
      const { data: { session }, error } = await sb.auth.getSession();
      
      if (error || !session) {
        showMessage('Your password reset link is invalid or has expired. Please request a new one from the login page.');
        document.getElementById('updateForm').style.display = 'none';
        
        // Add a back to login button
        const btn = document.createElement('a');
        btn.href = 'login.html';
        btn.className = 'btn btn-secondary w-full hover-lift mt-4';
        btn.textContent = '← Back to Login';
        document.querySelector('main').appendChild(btn);
      }
    });

    window.handleUpdatePassword = async function () {
      const pass1 = document.getElementById('newPassword').value;
      const pass2 = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('updateBtn');

      document.getElementById('statusMsg').style.display = 'none';
      
      if (!pass1 || !pass2) { showMessage('Please fill in both password fields.'); return; }
      if (pass1.length < 8) { showMessage('Password must be at least 8 characters long.'); return; }
      if (pass1 !== pass2) { showMessage('Passwords do not match. Please try again.'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const sb = await getSupabase();
        
        // Update the user's password securely
        const { error } = await sb.auth.updateUser({
          password: pass1
        });

        if (error) throw error;

        showMessage('Password successfully updated! You are securely logged in.', true);
        document.getElementById('updateForm').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');

      } catch (err) {
        showMessage(err.message || 'Could not update password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    };
  </script>
</body>
</html>
