<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .plan-badge { font-size: .75rem; font-weight: 700; padding: .25rem .75rem; border-radius: 99px; background: rgba(57,255,179,0.15); color: var(--mint); }
    .plan-badge.trial { background: rgba(255,184,48,0.15); color: var(--amber); }
    .plan-badge.admin { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .btn-signout { font-size: .875rem; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: .25rem .5rem; font-family: inherit; }
    .btn-signout:hover { color: var(--text); }
    .trial-banner { background: rgba(255,184,48,0.12); border-bottom: 1px solid rgba(255,184,48,0.25); padding: .75rem 2rem; display: flex; align-items: center; justify-content: space-between; font-size: .9rem; color: var(--amber); }
    .btn-upgrade { background: var(--amber); color: #2A3A36; border: none; border-radius: .5rem; padding: .375rem 1rem; font-size: .8rem; font-weight: 700; cursor: pointer; text-decoration: none; font-family: inherit; }
    .main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .welcome { font-size: 1.75rem; font-weight: 800; margin-bottom: .25rem; color: var(--text); }
    .welcome-sub { color: var(--text-muted); margin-bottom: 2rem; font-size: .95rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .btn-add { background: var(--primary); color: #2A3A36; border: none; border-radius: .5rem; padding: .5rem 1rem; font-size: .85rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: .35rem; font-family: inherit; }
    .btn-add:hover { opacity: .9; }
    .btn-add.hidden { visibility: hidden; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .student-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 1rem; padding: 1.5rem; transition: box-shadow .2s, border-color .2s; }
    .student-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.2); border-color: var(--primary); }
    .card-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #818cf8); display: flex; align-items: center; justify-content: center; color: #1a2420; font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; }
    .card-name { font-weight: 700; font-size: 1.05rem; margin-bottom: .2rem; color: var(--text); }
    .card-meta { font-size: .8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .card-tag { display: inline-block; background: rgba(57,255,179,0.1); border: 1px solid rgba(57,255,179,0.2); border-radius: 99px; padding: .15rem .6rem; font-size: .75rem; color: var(--mint); }
    .btn-practice { width: 100%; background: var(--primary); color: #2A3A36; border: none; border-radius: .5rem; padding: .625rem; font-size: .875rem; font-weight: 700; cursor: pointer; margin-top: .75rem; text-decoration: none; display: block; text-align: center; font-family: inherit; }
    .btn-practice:hover { opacity: .9; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .admin-panel { background: rgba(167,139,250,0.08); border: 1.5px solid rgba(167,139,250,0.25); border-radius: 1rem; padding: 1.5rem; margin-top: 2rem; }
    .admin-panel h3 { font-size: 1rem; font-weight: 700; color: #a78bfa; margin-bottom: .75rem; }
    .admin-stat { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: .5rem; padding: .5rem 1rem; font-size: .875rem; margin-right: .75rem; margin-bottom: .5rem; color: var(--text); }
    .admin-stat strong { color: #a78bfa; }
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: .5rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/pages/dashboard.html" class="nav-logo">⚡ Superholic Lab</a>
    <div class="nav-right">
      <span class="plan-badge" id="planBadge"></span>
      <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
    </div>
  </nav>

  <div class="trial-banner" id="trialBanner" style="display:none">
    <span>🎁 <strong id="trialDaysLeft"></strong> left in your free trial</span>
    <a href="/pages/pricing.html" class="btn-upgrade">Upgrade now →</a>
  </div>

  <main class="main">
    <h1 class="welcome" id="welcomeMsg">Welcome back 👋</h1>
    <p class="welcome-sub">Here's what's happening for your learner today.</p>

    <div class="section-header">
      <div class="section-title">Your learners</div>
      <a href="/pages/setup.html" class="btn-add" id="addChildBtn">＋ Add child</a>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="skeleton" style="height:180px; border-radius:1rem;"></div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display:none">
      <h3>🔐 Admin Panel</h3>
      <div id="adminStats"></div>
      <a href="/pages/admin.html" style="font-size:.875rem; color:#a78bfa; font-weight:600;">Open admin panel →</a>
    </div>
  </main>

  <!-- supabase-client.js must load before auth.js module so getSupabase() is defined globally -->
  <script src="/js/supabase-client.js"><\/script>
  <script type="module">
    import { guardPage } from '/js/auth.js';

    async function init() {
      const profile = await guardPage(true);
      if (!profile) return;

      const firstName = profile.full_name?.split(' ')[0] || 'there';
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${firstName} \ud83d\udc4b`;

      const badge = document.getElementById('planBadge');
      const planLabels = { trial: '\ud83c\udf81 Trial', single_subject: 'Single Subject', all_subjects: 'All Subjects', family: 'Family' };
      badge.textContent = profile.role === 'admin' ? '\ud83d\udc51 Admin' : (planLabels[profile.subscription_tier] || profile.subscription_tier);
      if (profile.role === 'admin') badge.className = 'plan-badge admin';
      else if (profile.subscription_tier === 'trial') badge.className = 'plan-badge trial';

      if (profile.subscription_tier === 'trial' && profile.trial_ends_at) {
        const daysLeft = Math.ceil((new Date(profile.trial_ends_at) - new Date()) / 86400000);
        if (daysLeft > 0) {
          document.getElementById('trialBanner').style.display = 'flex';
          document.getElementById('trialDaysLeft').textContent = `${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
        }
      }

      const supabase = await getSupabase();
      const query = profile.role === 'admin'
        ? supabase.from('students').select('*')
        : supabase.from('students').select('*').eq('parent_id', profile.id);

      const { data: students, error } = await query;
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      if (error || !students?.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">\ud83c\udfa2</div><p>No learners added yet.<br>Click "+ Add child" to get started.</p></div>`;
      } else {
        students.forEach(student => {
          const initials = student.name?.charAt(0).toUpperCase() || '?';
          const card = document.createElement('div');
          card.className = 'student-card';
          card.innerHTML = `
            <div class="card-avatar">${initials}</div>
            <div class="card-name">${escapeHtml(student.name)}</div>
            <div class="card-meta">${escapeHtml(student.level)}</div>
            ${student.selected_subject ? `<span class="card-tag">${escapeHtml(student.selected_subject)}</span>` : ''}
            <a href="/pages/subjects.html?student=${student.id}" class="btn-practice">Practice Now \u2192</a>
          `;
          grid.appendChild(card);
        });
      }

      const addBtn = document.getElementById('addChildBtn');
      if (profile.role !== 'admin' && students && students.length >= profile.max_children) {
        addBtn.classList.add('hidden');
      }

      if (profile.role === 'admin') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminStats').innerHTML =
          `<span class="admin-stat">Total students: <strong>${students?.length ?? 0}</strong></span>`;
      }
    }

    window.handleSignOut = async function () {
      const { signOut } = await import('/js/auth.js');
      await signOut();
    };

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    init();
  <\/script>
</body>
</html>
