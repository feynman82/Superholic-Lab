<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="dashboard-nav">
    <a href="/pages/dashboard.html" class="navbar-logo"><img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius:8px;flex-shrink:0;">
    Superholic Lab</a>
    <div class="nav-right" style="display:flex;align-items:center;gap:var(--space-4)">
      <span class="plan-badge" id="planBadge"></span>
      <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
    </div>
  </nav>

  <div class="trial-banner" id="trialBanner" style="display:none">
    <span>🎁 <strong id="trialDaysLeft"></strong> left in your free trial</span>
    <a href="/pages/pricing.html" class="btn-upgrade">Upgrade now →</a>
  </div>

  <main class="dashboard-main">
    <h1 class="welcome" id="welcomeMsg">Welcome back 👋</h1>
    <p class="welcome-sub">Here's what's happening for your learner today.</p>

    <div class="section-header">
      <div class="section-title">Your learners</div>
      <a href="/pages/setup.html" class="btn-add" id="addChildBtn">＋ Add child</a>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="skeleton" style="height:180px"></div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display:none">
      <h3>🔐 Admin Panel</h3>
      <div id="adminStats"></div>
      <a href="/pages/admin.html" class="admin-link">Open admin panel →</a>
    </div>
  </main>

  <!-- supabase-client.js must load before auth.js module so getSupabase() is defined -->
  <script src="/js/supabase-client.js"></script>
  <script type="module">
    import { guardPage } from '/js/auth.js';

    async function init() {
      const profile = await guardPage(true);
      if (!profile) return;

      const firstName = profile.full_name?.split(' ')[0] || 'there';
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${firstName} \ud83d\udc4b`;

      const badge = document.getElementById('planBadge');
      const planLabels = { trial: '🎁 Trial', single_subject: 'Single Subject', all_subjects: 'All Subjects', family: 'Family' };
      badge.textContent = profile.role === 'admin' ? '👑 Admin' : (planLabels[profile.subscription_tier] || profile.subscription_tier);
      if (profile.role === 'admin') badge.className = 'plan-badge admin';
      else if (profile.subscription_tier === 'trial') badge.className = 'plan-badge trial';

      if (profile.subscription_tier === 'trial' && profile.trial_ends_at) {
        const daysLeft = Math.ceil((new Date(profile.trial_ends_at) - new Date()) / 86400000);
        if (daysLeft > 0) {
          document.getElementById('trialBanner').style.display = 'flex';
          document.getElementById('trialDaysLeft').textContent = `${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
        }
      }

      // Load students using getSupabase() global
      const supabase = await getSupabase();
      const query = profile.role === 'admin'
        ? supabase.from('students').select('*')
        : supabase.from('students').select('*').eq('parent_id', profile.id);

      const { data: students, error } = await query;
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      if (error || !students?.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">\ud83c\udfa2</div><p>No learners added yet.<br>Click "+ Add child" to get started.</p></div>`;
      } else {
        students.forEach(student => {
          const initials = student.name?.charAt(0).toUpperCase() || '?';
          const card = document.createElement('div');
          card.className = 'student-card';
          card.innerHTML = `
            <div class="card-avatar">${initials}</div>
            <div class="card-name">${escapeHtml(student.name)}</div>
            <div class="card-meta">${escapeHtml(student.level)}</div>
            ${student.selected_subject ? `<span class="card-tag">${escapeHtml(student.selected_subject)}</span>` : ''}
            <a href="/pages/subjects.html?student=${student.id}" class="btn-practice">Practice Now \u2192</a>
          `;
          grid.appendChild(card);
        });
      }

      // Add child button: hide if at limit
      const addBtn = document.getElementById('addChildBtn');
      if (profile.role !== 'admin' && students && students.length >= profile.max_children) {
        addBtn.classList.add('hidden');
      }

      if (profile.role === 'admin') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminStats').innerHTML =
          `<span class="admin-stat">Total students: <strong>${students?.length ?? 0}</strong></span>`;
      }
    }

    window.handleSignOut = async function () {
      const { signOut } = await import('/js/auth.js');
      await signOut();
    };

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    init();
  </script>
</body>
</html>
