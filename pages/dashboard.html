<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); }

    /* Nav */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .plan-badge { font-size: .75rem; font-weight: 700; padding: .25rem .75rem; border-radius: 99px; background: #e0f2fe; color: #0369a1; }
    .plan-badge.trial { background: #fef3c7; color: #b45309; }
    .plan-badge.admin { background: #fce7f3; color: #9d174d; }
    .btn-signout { font-size: .875rem; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: .25rem .5rem; }
    .btn-signout:hover { color: var(--text); }

    /* Banner */
    .trial-banner { background: #fef3c7; border-bottom: 1px solid #fde68a; padding: .75rem 2rem; display: flex; align-items: center; justify-content: space-between; font-size: .9rem; }
    .trial-banner strong { color: #92400e; }
    .btn-upgrade { background: #f59e0b; color: #fff; border: none; border-radius: .5rem; padding: .375rem 1rem; font-size: .8rem; font-weight: 700; cursor: pointer; text-decoration: none; }

    /* Main */
    .main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .welcome { font-size: 1.75rem; font-weight: 800; margin-bottom: .25rem; }
    .welcome-sub { color: var(--text-muted); margin-bottom: 2rem; font-size: .95rem; }

    /* Student cards */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .btn-add { background: var(--primary); color: #fff; border: none; border-radius: .5rem; padding: .5rem 1rem; font-size: .85rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: .35rem; }
    .btn-add:hover { opacity: .9; }
    .btn-add.hidden { visibility: hidden; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .student-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 1rem; padding: 1.5rem; transition: box-shadow .2s, border-color .2s; }
    .student-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: var(--primary); }
    .card-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #818cf8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; }
    .card-name { font-weight: 700; font-size: 1.05rem; margin-bottom: .2rem; }
    .card-meta { font-size: .8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .card-tag { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 99px; padding: .15rem .6rem; font-size: .75rem; color: var(--text-muted); }
    .btn-practice { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: .5rem; padding: .625rem; font-size: .875rem; font-weight: 700; cursor: pointer; margin-top: .75rem; text-decoration: none; display: block; text-align: center; }
    .btn-practice:hover { opacity: .9; }

    /* Empty state */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Admin section */
    .admin-panel { background: #fdf4ff; border: 1.5px solid #e9d5ff; border-radius: 1rem; padding: 1.5rem; margin-top: 2rem; }
    .admin-panel h3 { font-size: 1rem; font-weight: 700; color: #7c3aed; margin-bottom: .75rem; }
    .admin-stat { display: inline-block; background: #fff; border: 1px solid #e9d5ff; border-radius: .5rem; padding: .5rem 1rem; font-size: .875rem; margin-right: .75rem; margin-bottom: .5rem; }
    .admin-stat strong { color: #7c3aed; }

    /* Loading skeleton */
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: .5rem; height: 1rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="/pages/dashboard.html" class="nav-logo">⚡ Superholic Lab</a>
    <div class="nav-right">
      <span class="plan-badge" id="planBadge"></span>
      <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
    </div>
  </nav>

  <!-- Trial banner (shown conditionally) -->
  <div class="trial-banner" id="trialBanner" style="display:none">
    <span>🎁 <strong id="trialDaysLeft"></strong> left in your free trial</span>
    <a href="/pages/pricing.html" class="btn-upgrade">Upgrade now →</a>
  </div>

  <!-- Main -->
  <main class="main">
    <h1 class="welcome" id="welcomeMsg">Welcome back 👋</h1>
    <p class="welcome-sub" id="welcomeSub">Here's what's happening for your learner today.</p>

    <div class="section-header">
      <div class="section-title">Your learners</div>
      <a href="/pages/setup.html" class="btn-add" id="addChildBtn">＋ Add child</a>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <!-- Populated by JS -->
      <div class="skeleton" style="height:180px; border-radius:1rem;"></div>
    </div>

    <!-- Admin panel -->
    <div class="admin-panel" id="adminPanel" style="display:none">
      <h3>🔐 Admin Panel</h3>
      <div id="adminStats"></div>
      <a href="/pages/admin.html" style="font-size:.875rem; color:#7c3aed; font-weight:600;">Open admin panel →</a>
    </div>
  </main>

  <script type="module">
    import { guardPage, signOut, isTrialActive } from '/js/auth.js';
    import { supabase } from '/js/supabase-client.js';

    async function init() {
      const profile = await guardPage(true);
      if (!profile) return;

      const firstName = profile.full_name?.split(' ')[0] || 'there';
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${firstName} 👋`;

      // Plan badge
      const badge = document.getElementById('planBadge');
      const planLabels = {
        trial: '🎁 Trial',
        single_subject: 'Single Subject',
        all_subjects: 'All Subjects',
        family: 'Family',
      };
      badge.textContent = profile.role === 'admin' ? '👑 Admin' : (planLabels[profile.subscription_tier] || profile.subscription_tier);
      if (profile.role === 'admin') badge.className = 'plan-badge admin';
      else if (profile.subscription_tier === 'trial') badge.className = 'plan-badge trial';

      // Trial banner
      if (profile.subscription_tier === 'trial' && profile.trial_ends_at) {
        const daysLeft = Math.ceil((new Date(profile.trial_ends_at) - new Date()) / 86400000);
        if (daysLeft > 0) {
          const banner = document.getElementById('trialBanner');
          banner.style.display = 'flex';
          document.getElementById('trialDaysLeft').textContent = `${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
        }
      }

      // Load students
      const query = profile.role === 'admin'
        ? supabase.from('students').select('*')
        : supabase.from('students').select('*').eq('parent_id', profile.id);

      const { data: students, error } = await query;

      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      if (error || !students?.length) {
        grid.innerHTML = `<div class="empty-state">
          <div class="empty-icon">🎒</div>
          <p>No learners added yet.<br>Click "+ Add child" to get started.</p>
        </div>`;
      } else {
        students.forEach(student => {
          const initials = student.name?.charAt(0).toUpperCase() || '?';
          const card = document.createElement('div');
          card.className = 'student-card';
          card.innerHTML = `
            <div class="card-avatar">${initials}</div>
            <div class="card-name">${escapeHtml(student.name)}</div>
            <div class="card-meta">${escapeHtml(student.level)}</div>
            ${student.selected_subject ? `<span class="card-tag">${escapeHtml(student.selected_subject)}</span>` : ''}
            <a href="/pages/subjects.html?student=${student.id}" class="btn-practice">Practice Now →</a>
          `;
          grid.appendChild(card);
        });
      }

      // Add child button visibility
      const addBtn = document.getElementById('addChildBtn');
      if (profile.role === 'admin') {
        addBtn.style.visibility = 'visible';
      } else if (students && students.length >= profile.max_children) {
        addBtn.classList.add('hidden');
      }

      // Admin panel
      if (profile.role === 'admin') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminStats').innerHTML = `
          <span class="admin-stat">Total students: <strong>${students?.length ?? 0}</strong></span>
        `;
      }
    }

    window.handleSignOut = async function () {
      const { signOut: so } = await import('/js/auth.js');
      await so();
    };

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    init();
  </script>
</body>
</html>
