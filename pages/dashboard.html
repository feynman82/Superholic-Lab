<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Superholic Lab</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  
  <script type="module">
    import { guardPage } from '/js/auth.js';
    await guardPage(true); 
  </script>
</head>
<body id="mainBody">

  <header class="navbar is-scrolled" id="navbar">
    <div class="container">
      <nav class="navbar-inner">
        <a href="dashboard.html" class="navbar-logo">
          <img src="../assets/logo.svg" width="32" height="32" alt="Superholic Lab">
          Superholic Lab
        </a>

        <div class="navbar-actions">
          <span class="plan-badge" id="planBadge"></span>
          
          <div id="auth-header-container">
            </div>

          <button class="navbar-toggle" id="navToggle" aria-label="Open menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </nav>

      <div class="navbar-mobile" id="navDropdown">
        <div class="container" id="navLinks">
          <a href="../index.html">Home</a>
          <a href="about.html">About Us</a>
          <a href="pricing.html">Pricing</a>
          <a href="contact.html">Contact Support</a>
        </div>
      </div>
    </div>
  </header>

  <div class="trial-banner" id="trialBanner" style="display:none">
    </div>

  <main style="padding-top: var(--space-20); min-height: 80vh;">
    <div class="container" style="padding-bottom: var(--space-16);">
      <h1 class="welcome-heading" id="welcomeHeading">Loading dashboard…</h1>
      
      <div class="student-grid" id="studentGrid"></div>

      <a href="setup.html" class="add-child-btn" id="addChildBtn">
        <div class="add-child-plus">+</div>
        <div class="add-child-label">Add another child</div>
      </a>

      <div class="admin-panel" id="adminPanel" style="display:none">
        <h3>Admin Console</h3>
        <div id="adminStats"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. 🇸🇬 Made in Singapore</p>
        <div class="flex gap-4">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </footer>

  <nav class="bottom-nav" id="bottomNav" hidden>
    <a href="../index.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Home
    </a>
    <a href="subjects.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Practise
    </a>
    <a href="tutor.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      AI Tutor
    </a>
    <a href="exam.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
      Exam
    </a>
    <a href="progress.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </a>
  </nav>

  <script src="../js/supabase-client.js"></script>
  <script>
    (async function() {
      // 1. Dropdown Toggle Logic
      const toggle = document.getElementById('navToggle');
      const dropdown = document.getElementById('navDropdown');
      toggle.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('is-open'); });
      document.addEventListener('click', (e) => { if (!dropdown.contains(e.target) && !toggle.contains(e.target)) dropdown.classList.remove('is-open'); });

      // 2. Dashboard Logic (Ported from dashboard - backup.html)
      try {
        const sb = await getSupabase();
        const { data: { session } } = await sb.auth.getSession();
        const body = document.getElementById('mainBody');
        const bottomNav = document.getElementById('bottomNav');
        const navLinks = document.getElementById('navLinks');

        if (session) {
          body.classList.add('is-logged-in');
          bottomNav.hidden = false;

          // Fetch User & Student Data
          const [profileRes, studentRes] = await Promise.all([
            sb.from('profiles').select('*').eq('id', session.user.id).single(),
            sb.from('students').select('*').eq('parent_id', session.user.id)
          ]);

          if (profileRes.data) {
            const profile = profileRes.data;
            
            // Update Plan Badge
            const planBadge = document.getElementById('planBadge');
            const planNames = { single_subject: 'Single Subject', all_subjects: 'All Subjects', family: 'Family', trial: '7-Day Trial' };
            planBadge.textContent = planNames[profile.subscription_tier] || profile.subscription_tier;

            // Update Trial Banner
            if (profile.subscription_tier === 'trial' && profile.trial_ends_at) {
              const days = Math.ceil((new Date(profile.trial_ends_at) - new Date()) / 86400000);
              const banner = document.getElementById('trialBanner');
              banner.innerHTML = `<div class="container">🎁 Your free trial ends in <strong>${days} days</strong>. <a href="pricing.html">Upgrade now</a> to keep your progress!</div>`;
              banner.style.display = 'block';
            }

            // Welcome Heading
            document.getElementById('welcomeHeading').textContent = `Welcome back, ${profile.full_name.split(' ')[0]} 👋`;

            // Render Student Grid
            renderStudents(studentRes.data, profile);

            // Admin Logic
            if (profile.role === 'admin') {
              document.getElementById('adminPanel').style.display = 'block';
              document.getElementById('adminStats').innerHTML = `<span class="admin-stat">Total students: <strong>${studentRes.data?.length ?? 0}</strong></span>`;
            }
          }

          // Inject Sign Out to Dropdown
          const signOut = document.createElement('a');
          signOut.href = "#";
          signOut.textContent = "Sign Out";
          signOut.style.color = "var(--rose)";
          signOut.onclick = async () => { await sb.auth.signOut(); window.location.href='login.html'; };
          navLinks.appendChild(signOut);
        }
      } catch (err) { console.warn('Dashboard initialization failed', err); }

      function renderStudents(students, profile) {
        const grid = document.getElementById('studentGrid');
        grid.innerHTML = '';
        if (!students || students.length === 0) {
          grid.innerHTML = '<div class="empty-state">No student profiles found. Click below to add your child!</div>';
          return;
        }
        students.forEach(student => {
          const initials = student.name.split(' ').map(n => n[0]).join('').toUpperCase();
          const card = document.createElement('div');
          card.className = 'student-card';
          card.innerHTML = `
            <div class="card-avatar">${initials}</div>
            <div class="card-name">${student.name}</div>
            <div class="card-meta">${student.level}</div>
            ${student.selected_subject ? `<span class="card-tag">${student.selected_subject}</span>` : ''}
            <a href="subjects.html?student=${student.id}" class="btn-practice">Practice Now →</a>
          `;
          grid.appendChild(card);
        });
        
        // Hide add button if at limit
        if (profile.role !== 'admin' && students.length >= profile.max_children) {
          document.getElementById('addChildBtn').style.display = 'none';
        }
      }
    })();
  </script>
</body>
</html>
