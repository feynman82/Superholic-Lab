<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Superholic Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  <meta name="robots" content="noindex, nofollow" />

  <script src="/js/header.js" defer></script>
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  <script src="/js/footer.js" defer></script>
  <script src="../js/supabase-client.js"></script>
  
  <script type="module">
    import { guardPage } from '/js/auth.js';
    import { initAppShell } from '/js/app-shell.js';
    
    async function boot() {
      try {
        window.userProfile = await guardPage(true); 
        
        if (typeof initAppShell === 'function') initAppShell(window.userProfile); 
        if (typeof window.initDashboard === 'function') window.initDashboard();

      } catch (err) {
        console.error('Boot sequence failed:', err);
      }
    }
    boot();
  </script>

  <style>
    /* ── Dashboard Specific UI (Modals & Context Menus) ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      opacity: 0; visibility: hidden; transition: all 0.2s ease;
      padding: var(--space-4);
    }
    .modal-overlay.is-open { opacity: 1; visibility: visible; }
    
    .modal-content {
      width: 100%; max-width: 500px;
      transform: scale(0.95); transition: transform 0.2s ease;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.is-open .modal-content { transform: scale(1); }

    .context-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 4px);
      background: var(--sage-dark); border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md); padding: 6px;
      min-width: 150px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 50; flex-direction: column; gap: 4px;
    }
    .context-menu.is-open { display: flex; animation: fadeDown 0.2s ease; }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    
    .context-menu button {
      text-align: left; width: 100%; color: rgba(255,255,255,0.85);
      padding: 8px 12px; border-radius: var(--radius-sm); border: none; background: transparent;
      font-size: var(--text-sm); font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .context-menu button:hover { background: rgba(255,255,255,0.1); color: var(--cream); }
    .context-menu button.text-danger:hover { color: var(--brand-error); }
  </style>
</head>

<body id="mainBody" class="bg-page texture-light-grid">

<global-header></global-header>

<main id="app" class="container flex flex-col w-full gap-8" style="padding-top: calc(var(--navbar-h) + var(--space-8)); padding-bottom: var(--space-10); min-height: 80vh; max-width: 1000px;">
  
  <div class="card p-6 w-full card-rule-rose">
    <h1 class="font-display text-3xl text-main mb-1 m-0">Mission Control</h1>
    <p class="text-muted text-sm m-0">Manage your students, review AI Tutor notes, and track practice history.</p>
  </div>

  <section class="w-full">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-display text-2xl text-main m-0">Your Students</h2>
      <button class="btn btn-primary btn-sm hover-lift" onclick="window.openModal('addStudentModal')">+ Add Student</button>
    </div>
    
    <div id="studentsGrid" class="flex flex-wrap gap-6 w-full">
      <div class="w-full text-center py-6"><div class="spinner-sm mx-auto"></div></div>
    </div>
  </section>

  <div class="flex flex-wrap gap-6 items-start w-full">
    
    <section class="flex-1 flex flex-col" style="min-width: 300px;">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-display text-2xl text-main m-0">Recent AI Tutor Notes</h2>
      </div>
      <div id="notesContainer" class="flex flex-col gap-4 w-full">
        <div class="card p-6 bg-page w-full text-center text-muted text-sm">Loading notes...</div>
      </div>
    </section>

    <section class="flex-1 flex flex-col" style="min-width: 300px;">
      <h2 class="font-display text-2xl text-main mb-4 m-0">Recent Practice History</h2>
      <div id="historyList" class="card bg-page w-full overflow-hidden flex flex-col">
         <div class="p-6 text-center text-muted text-sm">Loading history...</div>
      </div>
    </section>

  </div>
</main>

<global-footer></global-footer>

<div id="addStudentModal" class="modal-overlay" onclick="window.closeModalOnBgClick(event, 'addStudentModal')">
  <div class="card p-6 bg-surface modal-content">
    <h2 class="font-display text-2xl text-main mb-4 m-0" id="modalTitle">Add Student</h2>
    <form id="addStudentForm" class="flex flex-col gap-4">
      <input type="hidden" id="editStudentId">
      
      <div>
        <label class="text-sm font-bold text-main mb-1 block">Student Name</label>
        <input type="text" id="studentName" required class="form-input w-full" placeholder="e.g. Sarah">
      </div>
      
      <div>
        <label class="text-sm font-bold text-main mb-1 block">Level</label>
        <select id="studentLevel" class="form-select w-full">
          <option value="Primary 1">Primary 1</option>
          <option value="Primary 2">Primary 2</option>
          <option value="Primary 3">Primary 3</option>
          <option value="Primary 4" selected>Primary 4</option>
          <option value="Primary 5">Primary 5</option>
          <option value="Primary 6">Primary 6</option>
        </select>
      </div>
      
      <div id="singleSubjectSelector" style="display:none;">
        <label class="text-sm font-bold text-main mb-1 block">Subject (Single Subject Plan)</label>
        <select id="studentSubject" class="form-select w-full">
          <option value="Mathematics">Mathematics</option>
          <option value="Science">Science</option>
          <option value="English">English</option>
        </select>
      </div>
      
      <div class="flex justify-end gap-3 mt-4">
        <button type="button" class="btn btn-ghost" onclick="window.closeModal('addStudentModal')">Cancel</button>
        <button type="submit" class="btn btn-primary hover-lift" id="saveStudentBtn">Save Student</button>
      </div>
    </form>
  </div>
</div>

<div id="noteViewerModal" class="modal-overlay" onclick="window.closeModalOnBgClick(event, 'noteViewerModal')">
  <div class="card p-6 bg-surface modal-content" style="max-width: 600px;">
    <div class="flex justify-between items-start mb-4" style="border-bottom: 1px solid var(--border-light); padding-bottom: var(--space-4);">
      <div>
        <div id="noteSubjectBadge" class="badge badge-info mb-2 text-xs"></div>
        <h2 id="noteTitleView" class="font-display text-2xl text-main m-0"></h2>
      </div>
      <button class="btn btn-sm btn-ghost p-1" onclick="window.closeModal('noteViewerModal')" style="font-size: 1.5rem; line-height: 1;">&times;</button>
    </div>
    <div id="noteHtmlView" class="text-sm text-main" style="line-height: 1.6;"></div>
  </div>
</div>

<script>
window.initDashboard = async function() {
  const profile = window.userProfile;
  const isSingleSubject = profile?.subscription_tier === 'single_subject';

  const escapeHtml = (unsafe) => {
    return (unsafe || '').replace(/[&<"']/g, (m) => {
      switch (m) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '"': return '&quot;';
        case "'": return '&#039;';
        default: return m;
      }
    });
  };

  // Close context menus if clicking anywhere outside
  document.addEventListener('click', () => {
    document.querySelectorAll('.context-menu').forEach(d => d.classList.remove('is-open'));
  });

  window.loadDashboardData = async () => {
    const sb = await getSupabase();
    
    // 1. Load Students
    const { data: students, error: stdErr } = await sb.from('students').select('*').eq('parent_id', profile.id).order('created_at', { ascending: true });
    
    const grid = document.getElementById('studentsGrid');
    if (stdErr || !students || students.length === 0) {
      grid.innerHTML = `<div class="card p-6 bg-page w-full text-center text-muted">No students added yet. Click "+ Add Student" to begin.</div>`;
    } else {
      window.cachedStudents = students;
      grid.innerHTML = students.map(student => `
        <div class="card p-6 flex-1 hover-lift relative overflow-hidden cursor-pointer bg-page flex flex-col" style="min-width: 260px; border-top: 4px solid var(--brand-sage);" onclick="window.selectStudent('${student.id}')">
          <div class="flex justify-between items-start mb-2">
            <div class="font-display text-2xl text-main m-0">${escapeHtml(student.name)}</div>
            <div class="relative" onclick="event.stopPropagation()">
              <button class="btn btn-sm btn-ghost p-1 text-muted" onclick="window.toggleDropdown(event, '${student.id}')">⋮</button>
              <div id="dropdown-${student.id}" class="context-menu">
                <button onclick="window.editStudent(event, '${student.id}')">Edit Profile</button>
                <button class="text-danger" onclick="window.deleteStudent(event, '${student.id}')">Delete</button>
              </div>
            </div>
          </div>
          <div class="flex gap-2 items-center mb-6">
            <span class="badge badge-info">${escapeHtml(student.level)}</span>
            ${student.selected_subject ? `<span class="badge" style="background:var(--bg-elevated);">${escapeHtml(student.selected_subject)}</span>` : ''}
          </div>
          <div class="mt-auto pt-4 flex justify-between items-center" style="border-top: 1px solid var(--border-light);">
            <span class="text-sm font-bold text-main">Launch Portal</span>
            <span class="text-rose font-bold">→</span>
          </div>
        </div>
      `).join('');
    }

    // 2. Load Recent Notes
    const content = document.getElementById('notesContainer');
    try {
      const { data: notes } = await sb.from('study_notes').select('*, students(name)').in('student_id', students.map(s=>s.id)).order('created_at', { ascending: false }).limit(5);
      window.cachedNotes = notes;

      if(!notes || notes.length === 0) {
        content.innerHTML = `<div class="card p-6 bg-page w-full text-center text-muted text-sm">No notes saved from Miss Wena yet.</div>`;
      } else {
        content.innerHTML = notes.map(n => `
          <div class="card p-5 hover-lift cursor-pointer bg-page flex flex-col" onclick="window.viewStudyNote('${n.id}')">
            <div class="flex justify-between items-start mb-2">
              <div class="badge ${n.subject==='science'?'badge-dark-mint':n.subject==='english'?'badge-rose':'badge-info'} text-xs">${n.subject.toUpperCase()}</div>
              ${!n.is_read ? `<div class="badge badge-rose" style="padding: 2px 6px; font-size: 10px;">NEW</div>` : ''}
            </div>
            <h3 class="font-bold text-main mb-3 text-sm" style="line-height: 1.4;">${escapeHtml(n.title)}</h3>
            <div class="text-xs text-muted flex justify-between items-center">
              <div>${escapeHtml(n.students.name)} · ${new Date(n.created_at).toLocaleDateString('en-SG', { day: 'numeric', month: 'short' })}</div>
              <span class="text-rose font-bold">→</span>
            </div>
          </div>
        `).join('');
      }
    } catch(e) {
      content.innerHTML = `<div class="card p-6 bg-page w-full text-center text-danger text-sm">Failed to load notes.</div>`;
    }

    // 3. Load Recent History (Exams/Quiz)
    const historyList = document.getElementById('historyList');
    try {
      const { data: history } = await sb.from('exam_results').select('*, students(name)').in('student_id', students.map(s=>s.id)).order('completed_at', { ascending: false }).limit(6);
      
      if(!history || history.length === 0) {
        historyList.innerHTML = `<div class="p-6 text-center text-muted text-sm">No recent practice attempts.</div>`;
      } else {
        historyList.innerHTML = history.map(h => {
          const pct = Math.round((h.score / h.total_marks) * 100);
          return `
          <div class="p-4 flex justify-between items-center hover-lift" style="border-bottom: 1px solid var(--border-light);">
            <div>
              <div class="font-bold text-main text-sm">${escapeHtml(h.students.name)} · ${h.subject.toUpperCase()}</div>
              <div class="text-xs text-muted">${h.level} · ${new Date(h.completed_at).toLocaleDateString('en-SG', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
            </div>
            <div class="text-right">
              <div class="font-display text-xl ${pct >= 75 ? 'text-success' : pct >= 50 ? 'text-amber' : 'text-danger'}">${pct}%</div>
              <div class="text-xs text-muted">${h.score}/${h.total_marks}</div>
            </div>
          </div>`;
        }).join('');
      }
    } catch(e) {
      historyList.innerHTML = `<div class="p-6 text-center text-danger text-sm">Failed to load history.</div>`;
    }
  };

  window.loadDashboardData();

  // ── Modals & Routing ──
  window.selectStudent = (id) => {
    localStorage.setItem('shl_active_student_id', id);
    window.location.href = `progress.html?student=${id}`;
  };

  window.viewStudyNote = async (noteId) => {
    const note = (window.cachedNotes || []).find(n => n.id === noteId);
    if (!note) return;

    document.getElementById('noteTitleView').textContent = note.title;
    document.getElementById('noteSubjectBadge').textContent = note.subject.toUpperCase();
    document.getElementById('noteHtmlView').innerHTML = note.content_html; 
    
    window.openModal('noteViewerModal');

    if (!note.is_read) {
      const sb = await getSupabase();
      await sb.from('study_notes').update({ is_read: true }).eq('id', noteId);
      note.is_read = true; 
    }
  };

  window.toggleDropdown = (e, id) => {
    e.stopPropagation(); 
    document.querySelectorAll('.context-menu').forEach(d => {
      if (d.id !== `dropdown-${id}`) d.classList.remove('is-open');
    });
    document.getElementById(`dropdown-${id}`).classList.toggle('is-open');
  };

  window.openModal = (id) => {
    if (id === 'addStudentModal') {
      document.getElementById('addStudentForm').reset();
      document.getElementById('editStudentId').value = '';
      document.getElementById('modalTitle').textContent = 'Add Student';
      if (isSingleSubject) document.getElementById('singleSubjectSelector').style.display = 'block';
    }
    document.getElementById(id).classList.add('is-open');
  };

  window.closeModal = (id) => document.getElementById(id).classList.remove('is-open');
  
  window.closeModalOnBgClick = (e, id) => {
    if (e.target.id === id) window.closeModal(id);
  };

  window.editStudent = (e, id) => {
    e.stopPropagation();
    const student = window.cachedStudents.find(s => s.id === id);
    if (student) {
      document.getElementById('editStudentId').value = student.id;
      document.getElementById('studentName').value = student.name;
      document.getElementById('studentLevel').value = student.level;
      if (isSingleSubject && student.selected_subject) {
        document.getElementById('singleSubjectSelector').style.display = 'block';
        document.getElementById('studentSubject').value = student.selected_subject;
      }
      document.getElementById('modalTitle').textContent = 'Edit Student';
      window.openModal('addStudentModal');
    }
    document.getElementById(`dropdown-${id}`).classList.remove('is-open');
  };

  window.deleteStudent = async (e, id) => {
    e.stopPropagation();
    if (confirm('Are you sure you want to delete this student and all their history?')) {
      const sb = await getSupabase();
      await sb.from('students').delete().eq('id', id);
      window.loadDashboardData();
    }
  };

  document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveStudentBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const id = document.getElementById('editStudentId').value;
    const name = document.getElementById('studentName').value;
    const level = document.getElementById('studentLevel').value;
    const subject = isSingleSubject ? document.getElementById('studentSubject').value : null;

    const sb = await getSupabase();
    const payload = { parent_id: profile.id, name, level };
    if (subject) payload.selected_subject = subject;

    if (id) {
      await sb.from('students').update(payload).eq('id', id);
    } else {
      await sb.from('students').insert([payload]);
    }

    btn.disabled = false;
    btn.textContent = 'Save Student';
    window.closeModal('addStudentModal');
    window.loadDashboardData();
  });
};
</script>

</body>
</html>
