<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Paper — Superholic Lab</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script type="module">
    import { guardPage } from '/js/auth.js';
    await guardPage(true);
  </script>
  <style>
    /* ── DESIGN GUARDIAN: SKELETON BLUEPRINT ── */
    .exam-blueprint-card {
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-top: 2px dashed var(--mint);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      backdrop-filter: blur(12px);
      margin-bottom: var(--space-6);
    }
    .blueprint-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; font-weight: 700; color: var(--mint);
      text-transform: uppercase;
    }
    .blueprint-draft-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem; color: var(--amber);
      border: 1px solid rgba(255,184,48,0.25);
      padding: .2rem .6rem; border-radius: var(--radius-pill);
    }
    .blueprint-skeleton-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) 0; border-bottom: 1px solid var(--glass-border);
    }
    /* ── WIZARD LAYOUT ── */
    .wizard-step { display: none; }
    .wizard-step.is-active { display: block; animation: fadeIn 0.3s ease-in; }
    .wizard-subject-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4);
    }
  </style>
</head>
<body class="has-bottom-nav">

  <header class="navbar is-scrolled">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">Superholic Lab</a>
        <div class="navbar-actions">
          <span id="exam-timer" class="font-mono font-bold text-mint"></span>
        </div>
      </nav>
    </div>
  </header>

  <main style="padding: var(--space-8) 0;">
    <div class="container" style="max-width:720px;">
      
      <section id="exam-wizard">
        
        <div id="wizard-loading" class="text-center py-12">
          <p class="text-secondary">Detecting credentials...</p>
        </div>

        <div id="wizard-subject" class="wizard-step">
          <h1 class="wizard-step-heading">Choose a subject</h1>
          <div class="wizard-subject-grid" id="subject-options">
            <button class="wizard-subject-card card-maths" data-subject="mathematics">🔢 Mathematics</button>
            <button class="wizard-subject-card card-science" data-subject="science">🔬 Science</button>
            <button class="wizard-subject-card card-english" data-subject="english">📖 English</button>
          </div>
        </div>

        <div id="wizard-type" class="wizard-step">
          <h1 class="wizard-step-heading">Select Paper Type</h1>
          <div class="wizard-confirm-banner mb-6">
            <span id="wizard-confirm-text" class="wizard-confirm-text"></span>
          </div>

          <div class="wizard-type-grid mb-8" id="type-options">
            </div>

          <div class="exam-blueprint-card">
            <div class="blueprint-header flex justify-between mb-4">
              <span class="blueprint-eyebrow">Sample Format</span>
              <span class="blueprint-draft-badge">DRAFT PREVIEW</span>
            </div>
            <div id="blueprint-list"></div>
          </div>

          <button id="exam-start-btn" class="btn btn-primary w-full py-4">Generate Paper →</button>
        </div>
      </section>

      <section id="exam-paper" hidden>
        <div id="exam-header" class="border-b-2 border-glass-border pb-5 mb-8"></div>
        <div id="exam-sections"></div>
      </section>

    </div>
  </main>

  <script src="../js/exam-templates.js"></script>
  <script src="../js/exam-generator.js"></script>

  <script type="module">
    import { getSupabase } from '/js/supabase.js';

    const state = { level: '', subject: '', type: 'PRACTICE' };

    async function init() {
      const sb = await getSupabase();
      const { data: { user } } = await sb.auth.getUser();
      
      // 1. Automatic Credential Detection
      const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
      const { data: student } = await sb.from('students').select('*').eq('parent_id', user.id).single();

      state.level = student.level; // e.g., "Primary 4"
      const levelSlug = state.level.toLowerCase().replace(' ', '-');

      // 2. Linear Flow: Branch by Subscription Tier
      if (profile.subscription_tier === 'single_subject') {
        state.subject = student.selected_subject.toLowerCase();
        showStep('wizard-type');
      } else {
        document.getElementById('wizard-loading').hidden = true;
        showStep('wizard-subject');
      }
    }

    function showStep(id) {
      document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('is-active'));
      document.getElementById(id).classList.add('is-active');
      if (id === 'wizard-type') renderTypeSelection();
    }

    function renderTypeSelection() {
      const isP6 = state.level.includes('6');
      const types = [
        { id: 'WA1', label: 'WA 1' }, { id: 'WA2', label: 'WA 2' }, 
        { id: 'EOY', label: 'End-of-Year' }
      ];
      if (isP6) types.push({ id: 'PRELIM', label: 'PSLE Prelim' });

      const container = document.getElementById('type-options');
      container.innerHTML = types.map(t => `
        <button class="wizard-type-option" onclick="selectType('${t.id}')">
          <span class="wizard-type-name">${t.label}</span>
        </button>
      `).join('');
      
      updateUI();
    }

    window.selectType = (type) => {
      state.type = type;
      updateUI();
    };

    function updateUI() {
      // Dynamic Confirmation String
      document.getElementById('wizard-confirm-text').innerHTML = 
        `Generating <strong>Primary ${state.level.split(' ')[1]} ${state.subject}</strong> assessment paper for <strong>${state.type}</strong>`;
      
      // Render Skeleton Blueprint
      const tpl = getTemplate(state.subject, state.level.toLowerCase().replace(' ', '-'));
      const list = document.getElementById('blueprint-list');
      list.innerHTML = tpl.sections.map(sec => `
        <div class="blueprint-skeleton-row">
          <span class="text-secondary">${sec.label}</span>
          <span class="ml-auto font-bold">${sec.count} Questions</span>
        </div>
      `).join('');
    }

    document.getElementById('subject-options').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-subject]');
      if (!btn) return;
      state.subject = btn.dataset.subject;
      showStep('wizard-type');
    });

    init();
  </script>
</body>
</html>
