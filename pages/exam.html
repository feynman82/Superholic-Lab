<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Paper — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  <script type="module">
    import { guardPage } from '/js/auth.js';
    await guardPage(true);
  </script>
  <style>
    /* ── WIZARD & DESIGN TOKENS ─────────────────────────────────────────── */
    .wizard-step { display: none; }
    .wizard-step.is-active { display: block; animation: fadeUp 0.35s ease both; }

    .subject-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-4); }
    @media (max-width:640px) { .subject-grid { grid-template-columns: 1fr; } }
    
    .subject-card {
      background: var(--glass); border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-xl); padding: var(--space-8) var(--space-6);
      text-align: center; cursor: pointer; transition: all var(--transition-md);
    }
    .subject-card:hover { border-color: var(--mint); transform: translateY(-3px); }
    .subject-card.is-sel { border-color: var(--mint); background: rgba(57,255,179,0.05); }

    /* ── BLUEPRINT (SKELETON STYLE) ─────────────────────────────────────── */
    .blueprint-card {
      background: var(--glass);
      border: 2px dashed rgba(255,255,255,0.12);
      border-top: 3px solid var(--mint);
      border-radius: var(--radius-lg);
      padding: var(--space-6); margin: var(--space-6) 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .blueprint-badge { font-size: 0.65rem; color: var(--amber); border: 1px solid rgba(255,184,48,0.3); padding: 2px 9px; border-radius: var(--radius-pill); }
    .blueprint-row { display: flex; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem; }

    /* ── TIMER ──────────────────────────────────────────────────────────── */
    #exam-timer { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--mint); margin-right: var(--space-4); }
    #exam-timer.warn { color: var(--amber); }
    #exam-timer.danger { color: var(--danger); animation: pulse 1s infinite; }

    /* ── OVERLAYS ───────────────────────────────────────────────────────── */
    .full-overlay { position: fixed; inset: 0; background: rgba(15,23,20,0.98); backdrop-filter: blur(16px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-4); }
  </style>
</head>
<body class="has-bottom-nav">

  <header class="navbar is-scrolled" id="navbar">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">
          <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius:8px;flex-shrink:0;">
          Superholic Lab
        </a>
        <ul class="navbar-nav" role="list">
          <li><a href="../index.html">Home</a></li>
          <li><a href="pricing.html">Pricing</a></li>
        </ul>
        <div id="exam-timer" aria-live="polite"></div>
        <div class="navbar-actions">
          <a href="login.html"  class="btn btn-secondary btn-sm">Log In</a>
          <a href="signup.html" class="btn btn-primary   btn-sm">Start Free Trial</a>
        </div>
        <button class="navbar-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </nav>
      <div class="navbar-mobile" id="navMobile">
        <a href="../index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="login.html"  class="btn btn-secondary btn-sm mt-4">Log In</a>
        <a href="signup.html" class="btn btn-primary   btn-sm">Start Free Trial</a>
      </div>
    </div>
  </header>

  <div id="ov-load" class="full-overlay">
    <div class="spinner-sm"></div>
    <p class="text-cream">Detecting credentials...</p>
  </div>

  <div id="ov-gen" class="full-overlay" hidden>
    <div class="merlion-wrap"><div class="merlion-head"></div><div class="merlion-body"></div></div>
    <p id="gen-msg" class="text-mint font-bold"></p>
    <p class="text-secondary text-sm">Assembling MOE-aligned questions...</p>
  </div>

  <main id="app" class="container" style="max-width:720px; padding: var(--space-12) 0;">
    </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. All rights reserved. 🇸🇬 Made in Singapore</p>
        <div class="flex gap-4">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/exam-templates.js"></script>
  <script src="../js/exam-generator.js"></script>

  <script>
    (function () {
      'use strict';

      // ── Navbar Toggle ──
      const navToggle = document.getElementById('navToggle');
      const navMobile = document.getElementById('navMobile');
      if (navToggle && navMobile) {
        navToggle.addEventListener('click', () => {
          const isOpen = navMobile.classList.toggle('is-open');
          navToggle.setAttribute('aria-expanded', String(isOpen));
        });
      }

      var state = { phase: 'INIT', level: '', subject: '', tier: '', type: '', paper: null, answers: {}, timeLeft: 0 };
      var app = document.getElementById('app');

      function setState(updates) { Object.assign(state, updates); render(); }

      function render() {
        if (state.phase === 'SUBJECT') renderSubject();
        else if (state.phase === 'TYPE') renderType();
        else if (state.phase === 'EXAM') renderExam();
      }

      function renderSubject() {
        app.innerHTML = `
          <div class="wizard-step is-active">
            <h1 class="font-display text-3xl mb-8">Choose a Subject</h1>
            <div class="subject-grid">
              <div class="subject-card" onclick="setSubject('Mathematics')">🔢<br>Mathematics</div>
              <div class="subject-card" onclick="setSubject('Science')">🔬<br>Science</div>
              <div class="subject-card" onclick="setSubject('English')">📖<br>English</div>
            </div>
          </div>`;
      }

      window.setSubject = (s) => setState({ subject: s, phase: 'TYPE' });

      function renderType() {
        const isP6 = state.level.includes('6');
        const types = [{id:'WA1', l:'WA 1'}, {id:'WA2', l:'WA 2'}, {id:'EOY', l:'End-of-Year'}];
        if (isP6) types.push({id:'PRELIM', l:'PSLE Prelim'});

        app.innerHTML = `
          <div class="wizard-step is-active">
            <h1 class="font-display text-3xl mb-4">Select Paper Type</h1>
            <div class="p-4 bg-mint/5 border border-mint/20 rounded-lg mb-6 text-sm">
              Generating <strong>${state.level} ${state.subject}</strong> assessment paper for <strong>${state.type || '...'}</strong>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
              ${types.map(t => `<button class="btn btn-secondary" onclick="setType('${t.id}')">${t.l}</button>`).join('')}
            </div>
            <div class="blueprint-card">
              <div class="flex justify-between items-center mb-4"><span class="blueprint-eyebrow">Sample Format</span><span class="blueprint-badge">DRAFT PREVIEW</span></div>
              <div class="blueprint-row"><span>Section A (MCQ)</span><span>28 Qs</span></div>
              <div class="blueprint-row"><span>Section B (Open-Ended)</span><span>12 Qs</span></div>
            </div>
            <button class="btn btn-primary w-full py-4" onclick="triggerGen()">Generate Paper →</button>
          </div>`;
      }

      window.setType = (t) => setState({ type: t });

      window.triggerGen = () => {
        document.getElementById('ov-gen').hidden = false;
        // Mock generation delay
        setTimeout(() => {
          document.getElementById('ov-gen').hidden = true;
          setState({ phase: 'EXAM' });
        }, 1500);
      };

      async function init() {
        const sb = await getSupabase();
        const { data: { session } } = await sb.auth.getSession();
        if (!session) return window.location.href = 'login.html';

        // ── Auth-aware navbar ──
        const actionsEl = document.querySelector('.navbar-actions');
        if (actionsEl) {
          actionsEl.innerHTML = '<a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a><button class="btn btn-primary btn-sm" id="navSignOut">Sign Out</button>';
          document.getElementById('navSignOut').addEventListener('click', () => sb.auth.signOut().then(() => location.reload()));
        }

        const { data: student } = await sb.from('students').select('level, selected_subject').eq('parent_id', session.user.id).single();
        const { data: profile } = await sb.from('profiles').select('subscription_tier').eq('id', session.user.id).single();

        document.getElementById('ov-load').hidden = true;
        const nextPhase = profile.subscription_tier === 'single_subject' ? 'TYPE' : 'SUBJECT';
        setState({ level: student.level, subject: student.selected_subject, tier: profile.subscription_tier, phase: nextPhase });
      }

      init();
    })();
  </script>
</body>
</html>
