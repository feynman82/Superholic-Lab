  <script type="module">
    import { guardPage } from '/js/auth.js';
    import { initAppShell } from '/js/app-shell.js';
    
    // Boot sequence: Ensure profile loads BEFORE we trigger DOM manipulations
    async function boot() {
      try {
        window.userProfile = await guardPage(true); 
        
        const runInit = () => {
          if (typeof initAppShell === 'function') initAppShell(window.userProfile); 
          if (typeof window.initExamEngine === 'function') window.initExamEngine();
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', runInit);
        } else {
          runInit();
        }
      } catch (err) {
        console.error('Boot sequence failed:', err);
      }
    }
    boot();
  </script>

  <style>
    /* ─── EXAM SPECIFIC STYLES ─── */
    .exam-navigator {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: var(--space-6);
    }
    .nav-pip {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 700;
      background: var(--bg-elevated);
      color: var(--text-muted);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-pip.is-answered { background: rgba(5, 150, 105, 0.1); color: var(--brand-mint); border-color: rgba(5, 150, 105, 0.2); }
    .nav-pip.is-flagged { background: rgba(217, 119, 6, 0.1); color: var(--brand-amber); border-color: rgba(217, 119, 6, 0.4); }
    .nav-pip.is-active { border-color: var(--text-main); transform: scale(1.1); box-shadow: var(--shadow-sm); }
    
    .mcq-opt {
      display: flex;
      align-items: center;
      padding: var(--space-4);
      margin-bottom: var(--space-2);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .mcq-opt:hover { border-color: var(--border-dark); background: var(--bg-elevated); }
    .mcq-opt.is-sel {
      border-color: var(--brand-mint);
      background: rgba(5, 150, 105, 0.05);
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.1);
    }
    .mcq-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--bg-elevated);
      font-weight: bold;
      margin-right: var(--space-3);
    }
    .mcq-opt.is-sel .mcq-badge { background: var(--brand-mint); color: white; }

    /* Digital Scratchpad */
    .scratchpad-container {
      border: 2px solid var(--border-light);
      border-radius: var(--radius-md);
      background: #FFFFFF;
      position: relative;
      overflow: hidden;
      margin-top: var(--space-2);
    }
    .scratchpad-canvas {
      width: 100%;
      height: 300px;
      cursor: crosshair;
      touch-action: none; /* Prevents scrolling while drawing */
    }
    .scratchpad-tools {
      position: absolute;
      top: 8px; right: 8px;
      display: flex;
      gap: 8px;
    }

    /* Results Accordion */
    .result-item { border-left: 4px solid var(--border-light); padding-left: var(--space-4); margin-bottom: var(--space-6); }
    .result-item.c-ok { border-left-color: var(--brand-mint); }
    .result-item.c-part { border-left-color: var(--brand-amber); }
    .result-item.c-bad { border-left-color: var(--brand-error); }
    
    .timer-pill {
      background: var(--bg-surface);
      color: var(--text-main);
      padding: 6px 16px;
      border-radius: var(--radius-full);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      box-shadow: var(--shadow-sm);
    }
    .timer-pill.danger { background: var(--brand-error); color: white; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────────────────────────────────
 * EXAM ENGINE 3.0 — The "Focus Room" State Machine
 * ───────────────────────────────────────────────────────────────────────── */
window.initExamEngine = function () {
  'use strict';

  // ── STATE ────────────────────────────────────────────────────────────────
  const state = {
    phase:      'INIT',
    level:      '',      
    levelKey:   '',      
    subject:    '',      
    subjectKey: '',      
    tier:       '',      
    examType:   '',      
    studentId:  null,    
    paper:      null,
    allQs:      [],      // Flattened array for Focus Mode
    currentQIdx: 0,
    answers:    {},      // text answers
    drawings:   {},      // canvas data URLs
    flagged:    {},      // flagged question indices
    graded:     null,
    timerHandle: null,
    timeLeft:   0,
  };

  const app = document.getElementById('app');
  const TYPE_LABELS = { WA1: 'WA 1', WA2: 'WA 2', WA3: 'WA 3', EOY: 'End-of-Year', PRELIM: 'PSLE Prelim' };

  // ── UTILITIES ────────────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function setState(updates) {
    Object.assign(state, updates);
    render();
  }

  // Normalize Answer for Short Answer matching
  function normalizeAnswer(str) {
    if (!str) return '';
    let s = String(str).toLowerCase().trim().replace(/[\s,]+/g, '');
    s = s.replace(/hours|hour|hrs|hr/g, 'h').replace(/minutes|minute|mins/g, 'min').replace(/seconds|second|secs|sec/g, 's');
    s = s.replace(/kilograms|kilogram|kgs/g, 'kg').replace(/grams|gram|gms|gm/g, 'g').replace(/centimetres|centimeters|centimetre|centimeter|cms/g, 'cm').replace(/metres|meters|metre|meter/g, 'm').replace(/litres|liters|litre|liter/g, 'l').replace(/millilitres|milliliters|millilitre|milliliter|mls/g, 'ml');
    s = s.replace(/dollars|dollar/g, '$').replace(/cents|cent/g, 'c');
    return s;
  }

  // ── TIMER ────────────────────────────────────────────────────────────────
  function startTimer(seconds) {
    state.timeLeft = seconds;
    clearInterval(state.timerHandle);
    
    const timerContainer = document.getElementById('nav-timer-container');
    timerContainer.innerHTML = `<div id="exam-timer" class="timer-pill"></div>`;
    
    tickTimer();
    state.timerHandle = setInterval(() => {
      state.timeLeft = Math.max(0, state.timeLeft - 1);
      tickTimer();
      if (state.timeLeft === 0) {
        clearInterval(state.timerHandle);
        autoSubmit();
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(state.timerHandle);
    document.getElementById('nav-timer-container').innerHTML = '';
  }

  function tickTimer() {
    const el = document.getElementById('exam-timer');
    if (!el) return;
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    el.textContent = `⏱ ${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    
    if (state.timeLeft <= 60) el.className = 'timer-pill danger';
    else if (state.timeLeft <= 300) el.style.color = 'var(--brand-amber)';
  }

  function autoSubmit() {
    saveCurrentAnswerState();
    submitExam();
  }

  // ── RENDER DISPATCHER ────────────────────────────────────────────────────
  function render() {
    switch (state.phase) {
      case 'INIT':    renderInit();    break;
      case 'SUBJECT': renderSubject(); break;
      case 'TYPE':    renderType();    break;
      case 'GEN':     renderGenerating(); break;
      case 'EXAM':    renderFocusExam(); break;
      case 'RESULTS': renderResults(); break;
    }
  }

  // ── PHASE: INIT ──────────────────────────────────────────────────────────
  async function renderInit() {
    app.innerHTML = `<div class="flex justify-center p-10"><div class="spinner-sm"></div></div>`;
    try {
      const profile = window.userProfile;
      if (!profile) { window.location.href = 'login.html?redirect=exam'; return; }

      const sb = await getSupabase();
      const { data: student } = await sb.from('students').select('id,level,selected_subject').eq('parent_id', profile.id).single();

      const tier = profile.subscription_tier || 'trial';
      const level = student?.level || 'Primary 4';
      const levelKey = level.toLowerCase().replace(' ', '-');
      const studentId = student?.id || null;

      if (tier === 'single_subject') {
        const sub = student?.selected_subject || 'Mathematics';
        setState({ phase: 'TYPE', tier, level, levelKey, subject: sub, subjectKey: sub.toLowerCase(), studentId });
      } else {
        setState({ phase: 'SUBJECT', tier, level, levelKey, studentId });
      }
    } catch (err) {
      app.innerHTML = `<div class="card p-8 text-center"><p class="text-danger font-bold mb-4">Failed to load profile.</p><button class="btn btn-primary" onclick="location.reload()">Reload</button></div>`;
    }
  }

  // ── PHASE: SUBJECT ───────────────────────────────────────────────────────
  function renderSubject() {
    const levelNum = state.level.replace('Primary ', '');
    const subjects = [
      { name: 'Mathematics', icon: '📐', tag: 'P1–P6' },
      { name: 'Science', icon: '🔬', tag: 'P3–P6' },
      { name: 'English', icon: '📖', tag: 'P1–P6' }
    ];

    const cards = subjects.map(s => `
      <div class="card hover-lift flex flex-col items-center justify-center p-6 cursor-pointer" onclick="window.selectSubject('${s.name}')">
        <div class="text-4xl mb-4">${s.icon}</div>
        <h3 class="font-bold text-xl">${s.name}</h3>
        <span class="badge mt-2">${s.tag}</span>
      </div>
    `).join('');

    app.innerHTML = `
      <div class="text-center mb-8">
        <div class="badge badge-info mb-2">Step 1 of 2</div>
        <h1 class="font-display text-4xl text-main">Choose a Subject</h1>
        <p class="text-muted text-lg mt-2">Primary ${esc(levelNum)}</p>
      </div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4);">
        ${cards}
      </div>
    `;

    window.selectSubject = (sub) => setState({ subject: sub, subjectKey: sub.toLowerCase(), phase: 'TYPE', examType: '' });
  }

  // ── PHASE: TYPE ──────────────────────────────────────────────────────────
  function renderType() {
    let types = [
      { id: 'WA1', label: 'WA 1', sub: 'Weighted Assessment 1' },
      { id: 'WA2', label: 'WA 2', sub: 'Weighted Assessment 2' }
    ];
    if (state.levelKey === 'primary-6') {
      types.push({ id: 'PRELIM', label: 'PSLE Prelim', sub: 'Full PSLE simulation' });
    } else {
      types.push({ id: 'WA3', label: 'WA 3', sub: 'Weighted Assessment 3' });
      types.push({ id: 'EOY', label: 'End of Year', sub: 'End-of-Year examination' });
    }

    if (!state.examType) state.examType = types[0].id;

    const chips = types.map(t => `
      <div class="card p-4 cursor-pointer hover-lift flex flex-col justify-center ${t.id === state.examType ? 'bg-sage-dark' : ''}" 
           style="border: 2px solid ${t.id === state.examType ? 'var(--brand-mint)' : 'var(--border-light)'};"
           onclick="window.selectType('${t.id}')">
        <div class="font-bold text-lg ${t.id === state.examType ? 'text-white' : 'text-main'}">${esc(t.label)}</div>
        <div class="text-xs ${t.id === state.examType ? 'text-white' : 'text-muted'} opacity-80 mt-1">${esc(t.sub)}</div>
      </div>
    `).join('');

    // Fetch Template Data for Dossier
    const tpl = (typeof getTemplate !== 'undefined') ? getTemplate(state.subjectKey, state.levelKey) : null;
    let blueprintHtml = '<p class="text-muted text-sm">Loading blueprint...</p>';
    if (tpl) {
      const isWA = state.examType.startsWith('WA');
      const scale = isWA ? 0.5 : 1.0;
      const duration = Math.round(tpl.duration * scale);
      const totalMarks = Math.round(tpl.totalMarks * scale);
      blueprintHtml = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-display text-2xl text-main">Exam Dossier</h2>
          <div class="badge badge-info">DRAFT</div>
        </div>
        <ul class="flex flex-col gap-2 text-sm text-main mb-4" style="list-style:none;">
          <li class="flex justify-between border-b border-light pb-2"><span>Total Duration</span> <span class="font-bold">⏱ ${duration} mins</span></li>
          <li class="flex justify-between border-b border-light pb-2"><span>Total Marks</span> <span class="font-bold">${totalMarks} M</span></li>
        </ul>
      `;
    }

    app.innerHTML = `
      <div class="text-center mb-8">
        <div class="badge badge-info mb-2">${state.tier === 'single_subject' ? 'Step 1 of 1' : 'Step 2 of 2'}</div>
        <h1 class="font-display text-4xl text-main">Select Paper Type</h1>
      </div>
      
      <div class="flex flex-wrap gap-8">
        <div class="flex-1 flex flex-col gap-4" style="min-width: 300px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
            ${chips}
          </div>
          ${state.tier !== 'single_subject' ? `<button class="btn btn-ghost mt-4" onclick="window.backToSubject()">← Back to Subjects</button>` : ''}
        </div>
        
        <div class="flex-1" style="min-width: 300px;">
          <div class="card p-6 border-l-4 border-mint" style="background: var(--bg-elevated); border-left: 4px solid var(--brand-mint);">
            ${blueprintHtml}
            <button class="btn btn-primary btn-full mt-4 hover-lift" onclick="window.triggerGen()">Generate Paper →</button>
          </div>
        </div>
      </div>
    `;

    window.selectType = (id) => setState({ examType: id });
    window.backToSubject = () => setState({ phase: 'SUBJECT', examType: '' });
    window.triggerGen = () => setState({ phase: 'GEN' });
  }

  // ── PHASE: GENERATING ────────────────────────────────────────────────────
  function renderGenerating() {
    app.innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
        <div class="spinner-sm mb-6" style="width:40px; height:40px; border-width: 4px;"></div>
        <h2 class="font-display text-3xl text-main mb-2" id="genMsg">Assembling Paper...</h2>
        <p class="text-muted text-sm">Applying MOE difficulty calibration</p>
      </div>
    `;

    const msgs = ['Gathering questions...', 'Calibrating difficulty...', 'Checking syllabus alignment...'];
    let m = 0;
    const int = setInterval(() => { m = (m+1)%msgs.length; const el = document.getElementById('genMsg'); if(el) el.textContent = msgs[m]; }, 1000);

    generateExam(state.subjectKey, state.levelKey, state.examType).then(paper => {
      clearInterval(int);
      // Flatten questions for Focus Mode
      let flat = [];
      paper.sections.forEach(sec => {
        sec.questions.forEach(q => {
          flat.push({ ...q, sectionLabel: sec.label, sectionInstr: sec.instructions });
        });
      });
      setState({ phase: 'EXAM', paper, allQs: flat, currentQIdx: 0, answers: {}, drawings: {}, flagged: {} });
    }).catch(err => {
      clearInterval(int);
      app.innerHTML = `<div class="card p-8 text-center"><p class="text-danger font-bold mb-4">Error: ${err.message}</p><button class="btn btn-primary" onclick="location.reload()">Try Again</button></div>`;
    });
  }

  // ── PHASE: EXAM (THE FOCUS ROOM) ─────────────────────────────────────────
  function renderFocusExam() {
    if (state.currentQIdx === 0 && !state.timerHandle) {
      startTimer(state.paper.duration * 60);
    }

    const q = state.allQs[state.currentQIdx];
    const totalQs = state.allQs.length;

    // Build Navigator Grid
    const navPips = state.allQs.map((_, i) => {
      let classes = 'nav-pip hover-lift';
      if (i === state.currentQIdx) classes += ' is-active';
      if (state.flagged[i]) classes += ' is-flagged';
      else if (state.answers[i] || state.drawings[i]) classes += ' is-answered';
      
      return `<button class="${classes}" onclick="window.jumpToQ(${i})">${i+1}</button>`;
    }).join('');

    // Build Question UI
    let uiHtml = '';
    const ansKey = state.currentQIdx; 
    const savedAns = state.answers[ansKey] || '';

    if (q.type === 'mcq') {
      const letters = ['A','B','C','D'];
      uiHtml = q.options.map((opt, i) => {
        const isSel = savedAns === letters[i];
        return `
          <div class="mcq-opt hover-lift ${isSel ? 'is-sel' : ''}" onclick="window.selectMcq('${letters[i]}')">
            <span class="mcq-badge">${letters[i]}</span>
            <span class="font-medium">${esc(opt)}</span>
          </div>`;
      }).join('');
    } else if (q.type === 'short_ans') {
      uiHtml = `<input type="text" id="qInput" class="form-input mt-4" placeholder="Type your final answer..." value="${esc(savedAns)}" autocomplete="off">`;
    } else if (['open_ended', 'word_problem'].includes(q.type)) {
      // Electronic Pen / Text Toggle
      const isDrawingMode = !!state.drawings[ansKey];
      uiHtml = `
        <div class="flex justify-end gap-2 mb-2">
          <button class="btn btn-sm ${!isDrawingMode ? 'btn-secondary bg-sage-dark text-white' : 'btn-ghost'}" onclick="window.setMode('text')">⌨️ Type</button>
          <button class="btn btn-sm ${isDrawingMode ? 'btn-secondary bg-sage-dark text-white' : 'btn-ghost'}" onclick="window.setMode('draw')">✏️ Pen Tool</button>
        </div>
        ${!isDrawingMode 
          ? `<textarea id="qInput" class="form-input w-full p-4" rows="6" style="height:auto; resize:vertical;" placeholder="Show your working and final answer...">${esc(savedAns)}</textarea>`
          : `
            <div class="scratchpad-container">
              <canvas id="scratchpadCanvas" class="scratchpad-canvas"></canvas>
              <div class="scratchpad-tools">
                <button class="btn btn-sm btn-ghost bg-surface" onclick="window.clearCanvas()">🗑️ Clear</button>
              </div>
            </div>
            <input type="text" id="qInput" class="form-input mt-4" placeholder="Final Answer (Required for AI Grading)" value="${esc(savedAns)}" autocomplete="off">
          `
        }
      `;
    } else {
      uiHtml = `<textarea id="qInput" class="form-input w-full p-4" rows="4" style="height:auto;">${esc(savedAns)}</textarea>`;
    }

    app.innerHTML = `
      <div class="flex flex-col md:flex-row gap-8">
        <!-- Left: Question Area -->
        <div class="flex-1 flex flex-col min-w-[300px]">
          <div class="badge badge-info mb-4 self-start">${esc(q.sectionLabel)}</div>
          
          <div class="card p-6 mb-4 flex-1">
            <div class="flex justify-between items-center mb-4 border-b border-light pb-2">
              <div class="font-bold text-muted">Question ${state.currentQIdx + 1} of ${totalQs}</div>
              <div class="text-sm font-bold text-main bg-elevated px-2 py-1 rounded">${q.marks} mark${q.marks > 1 ? 's' : ''}</div>
            </div>
            
            ${q.sectionInstr ? `<p class="text-sm text-muted italic mb-4">${esc(q.sectionInstr)}</p>` : ''}
            <p class="text-lg text-main font-medium mb-6 leading-relaxed">${esc(q.question_text)}</p>
            
            <div class="question-ui">${uiHtml}</div>
          </div>

          <!-- Bottom Action Bar -->
          <div class="flex justify-between items-center bg-surface p-4 rounded-lg border border-light box-shadow-sm">
            <button class="btn btn-ghost" onclick="window.navExam(-1)" ${state.currentQIdx === 0 ? 'disabled' : ''}>← Previous</button>
            <button class="btn btn-ghost hover-lift" onclick="window.toggleFlag()" style="color: ${state.flagged[ansKey] ? 'var(--brand-amber)' : 'var(--text-muted)'}; border: 1px solid ${state.flagged[ansKey] ? 'var(--brand-amber)' : 'transparent'};">
              ${state.flagged[ansKey] ? '🚩 Flagged' : '🚩 Flag for review'}
            </button>
            ${state.currentQIdx === totalQs - 1 
              ? `<button class="btn btn-primary hover-lift" onclick="window.manualSubmit()">Submit Paper →</button>`
              : `<button class="btn btn-secondary hover-lift" onclick="window.navExam(1)">Next →</button>`
            }
          </div>
        </div>

        <!-- Right: Exam Navigator -->
        <div class="w-full md:w-64">
          <div class="card p-6 sticky top-[100px]">
            <h3 class="font-bold text-main mb-4">Exam Navigator</h3>
            <div class="exam-navigator">${navPips}</div>
            <div class="flex flex-col gap-2 mt-4 pt-4 border-t border-light text-xs text-muted font-medium">
              <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-elevated"></div> Unanswered</div>
              <div class="flex items-center gap-2"><div class="w-3 h-3 rounded" style="background: rgba(5, 150, 105, 0.2);"></div> Answered</div>
              <div class="flex items-center gap-2"><div class="w-3 h-3 rounded" style="background: rgba(217, 119, 6, 0.2);"></div> Flagged</div>
            </div>
          </div>
        </div>
      </div>
    `;

    // Initialize Canvas if in draw mode
    if (document.getElementById('scratchpadCanvas')) {
      initCanvas(ansKey);
    }
  }

  // ── EXAM INTERACTIONS ────────────────────────────────────────────────────
  window.saveCurrentAnswerState = () => {
    const qType = state.allQs[state.currentQIdx].type;
    const ansKey = state.currentQIdx;
    
    if (qType !== 'mcq') {
      const inp = document.getElementById('qInput');
      if (inp) state.answers[ansKey] = inp.value;
    }
    
    const canvas = document.getElementById('scratchpadCanvas');
    if (canvas) state.drawings[ansKey] = canvas.toDataURL();
  };

  window.navExam = (dir) => {
    window.saveCurrentAnswerState();
    const newIdx = state.currentQIdx + dir;
    if (newIdx >= 0 && newIdx < state.allQs.length) {
      setState({ currentQIdx: newIdx });
    }
  };

  window.jumpToQ = (idx) => {
    window.saveCurrentAnswerState();
    setState({ currentQIdx: idx });
  };

  window.selectMcq = (letter) => {
    state.answers[state.currentQIdx] = letter;
    renderFocusExam(); // Re-render to show selection & update pip
  };

  window.toggleFlag = () => {
    window.saveCurrentAnswerState();
    const k = state.currentQIdx;
    state.flagged[k] = !state.flagged[k];
    renderFocusExam();
  };

  window.setMode = (mode) => {
    window.saveCurrentAnswerState();
    const k = state.currentQIdx;
    if (mode === 'draw') {
      state.drawings[k] = state.drawings[k] || 'init'; // flag to trigger drawing mode
    } else {
      delete state.drawings[k]; // text mode
    }
    renderFocusExam();
  };

  window.manualSubmit = () => {
    window.saveCurrentAnswerState();
    if (confirm("Are you sure you want to submit your paper?")) {
      submitExam();
    }
  };

  // ── CANVAS LOGIC ─────────────────────────────────────────────────────────
  let ctx, isDrawing = false;
  function initCanvas(qid) {
    const canvas = document.getElementById('scratchpadCanvas');
    if (!canvas) return;
    
    // Setup for High-DPI screens
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 300;
    
    ctx = canvas.getContext('2d');
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2C3E3A';

    // Load existing drawing
    if (state.drawings[qid] && state.drawings[qid] !== 'init') {
      let img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = state.drawings[qid];
    }

    const getPos = (e) => {
      const r = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x, y };
    };

    const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
    const draw = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
    const stop = () => { if(isDrawing) { isDrawing = false; state.drawings[qid] = canvas.toDataURL(); } };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stop);
    canvas.addEventListener('mouseout', stop);

    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stop);
  }

  window.clearCanvas = () => {
    if(ctx) {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      state.drawings[state.currentQIdx] = ctx.canvas.toDataURL();
    }
  };

  // ── SUBMIT & GRADE ───────────────────────────────────────────────────────
  function submitExam() {
    stopTimer();
    app.innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
        <div class="spinner-sm mb-6" style="width:40px; height:40px;"></div>
        <h2 class="font-display text-3xl text-main mb-2">Miss Wena is marking...</h2>
        <p class="text-muted text-sm">Checking for MOE keywords and methods</p>
      </div>
    `;

    let graded = [];
    let queue = [];

    state.allQs.forEach((q, i) => {
      const sa = state.answers[i] || '';
      let r = { q, sa, earned: 0, max: q.marks, status: 'wrong', fb: '' };

      if (q.type === 'mcq') {
        r.earned = sa === q.correct_answer ? q.marks : 0;
        r.status = sa === q.correct_answer ? 'correct' : 'wrong';
        r.fb = r.status === 'wrong' && sa ? (q.wrong_explanations?.[sa] || '') : '';
        graded.push(r);
      } 
      else if (q.type === 'short_ans') {
        const normSa = normalizeAnswer(sa);
        const accepted = [q.correct_answer, ...(q.accept_also||[])].map(normalizeAnswer);
        const correct = accepted.includes(normSa);
        r.earned = correct ? q.marks : 0;
        r.status = correct ? 'correct' : 'wrong';
        graded.push(r);
      }
      else {
        // AI Grading for open_ended / word_problem
        r.status = 'pending';
        graded.push(r);
        const idx = graded.length - 1;
        
        queue.push(
          fetch('/api/grade-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              questionId: q.id, questionType: q.type, questionText: q.question_text,
              subject: state.subject, level: state.level,
              correctAnswer: q.correct_answer || q.model_answer || '',
              modelAnswer: q.model_answer || '',
              keywords: q.keywords || [], workedSolution: q.worked_solution || '',
              studentAnswer: sa, marks: q.marks
            })
          })
          .then(res => res.json())
          .then(data => {
            graded[idx].earned = data.score || 0;
            graded[idx].fb = data.feedback || '';
            graded[idx].status = graded[idx].earned === q.marks ? 'correct' : graded[idx].earned > 0 ? 'partial' : 'wrong';
          })
          .catch(() => {
            graded[idx].status = 'pending';
            graded[idx].fb = 'AI grading unavailable. Review model answer manually.';
          })
        );
      }
    });

    Promise.all(queue).then(() => {
      saveExamResult(graded);
      setState({ phase: 'RESULTS', graded });
    });
  }

  async function saveExamResult(graded) {
    if (!state.studentId) return;
    try {
      const sb = await getSupabase();
      const earned = graded.reduce((s, r) => s + (r.earned || 0), 0);
      const possible = graded.reduce((s, r) => s + r.max, 0);
      const timeTaken = (state.paper?.duration * 60) - state.timeLeft;

      await sb.from('exam_results').insert({
        student_id: state.studentId, subject: state.subject, level: state.level,
        exam_type: state.examType || 'PRACTICE', score: earned, total_marks: possible,
        questions_attempted: graded.length, time_taken: timeTaken >= 0 ? timeTaken : null,
      });
    } catch (err) { console.error('[exam] saveExamResult failed:', err); }
  }

  // ── PHASE: RESULTS ───────────────────────────────────────────────────────
  function renderResults() {
    const graded = state.graded || [];
    const earned = graded.reduce((s,r) => s + (r.earned || 0), 0);
    const possible = graded.reduce((s,r) => s + r.max, 0);
    const pct = possible > 0 ? Math.round(earned / possible * 100) : 0;
    
    let gradeStr = 'NEEDS REVIEW';
    let gradeCol = 'var(--brand-error)';
    if (pct >= 85) { gradeStr = 'AL1 - DISTINCTION'; gradeCol = 'var(--brand-mint)'; }
    else if (pct >= 65) { gradeStr = 'MERIT'; gradeCol = 'var(--maths-colour)'; }
    else if (pct >= 50) { gradeStr = 'PASS'; gradeCol = 'var(--brand-amber)'; }

    const items = graded.map((r, i) => {
      let cls = r.status === 'correct' ? 'c-ok' : r.status === 'partial' ? 'c-part' : 'c-bad';
      let ansHtml = '';
      
      if (r.q.type === 'mcq') {
        const letters = ['A','B','C','D'];
        const yourLbl = r.sa ? `${r.sa}: ${esc(r.q.options[letters.indexOf(r.sa)]||'')}` : '(no answer)';
        const corrLbl = `${r.q.correct_answer}: ${esc(r.q.options[letters.indexOf(r.q.correct_answer)]||'')}`;
        ansHtml = `<div class="bg-page p-3 rounded mt-2 text-sm"><span class="font-bold">Yours:</span> ${yourLbl}<br><span class="font-bold text-success">Correct:</span> ${corrLbl}</div>`;
      } else {
        const modelAns = r.q.model_answer || r.q.correct_answer || r.q.worked_solution || '';
        ansHtml = `<div class="bg-page p-3 rounded mt-2 text-sm"><span class="font-bold">Yours:</span> ${esc(r.sa || '(blank)')}<br><span class="font-bold text-success">Model:</span> ${esc(modelAns)}</div>`;
      }

      // Drawing attachment
      const drawingData = state.drawings[i];
      const drawingHtml = (drawingData && drawingData !== 'init') ? `<div class="mt-2"><p class="text-xs font-bold text-muted mb-1">Your Digital Scratchpad:</p><img src="${drawingData}" style="max-height: 100px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); background: white;"></div>` : '';

      return `
        <div class="card p-6 mb-4 result-item ${cls}">
          <div class="flex justify-between">
            <span class="font-bold text-muted">Q${i+1}</span>
            <span class="font-bold" style="color: ${r.earned > 0 ? 'var(--brand-mint)' : 'var(--text-muted)'}">${r.earned}/${r.max}</span>
          </div>
          <p class="font-medium mt-2 mb-2">${esc(r.q.question_text)}</p>
          ${ansHtml}
          ${drawingHtml}
          ${r.fb ? `<div class="mt-4 p-3 rounded text-sm bg-elevated border-l-4 border-amber"><strong class="text-main">Miss Wena's Feedback:</strong><br>${esc(r.fb)}</div>` : ''}
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="text-center mb-8">
        <h1 class="font-display text-4xl text-main mb-2">Paper Complete</h1>
        <div class="card p-8 inline-flex flex-col items-center justify-center border-l-4" style="border-left-color: ${gradeCol};">
          <div class="text-5xl font-display" style="color: ${gradeCol};">${earned} <span class="text-3xl text-muted">/ ${possible}</span></div>
          <div class="font-bold mt-2" style="color: ${gradeCol};">${gradeStr} (${pct}%)</div>
        </div>
      </div>
      
      <h3 class="font-display text-2xl text-main mb-4">Question Breakdown</h3>
      ${items}
      
      <div class="flex justify-center gap-4 mt-8">
        <button class="btn btn-primary hover-lift" onclick="location.reload()">Try Another Paper</button>
        <a href="tutor.html" class="btn btn-secondary hover-lift">Ask Miss Wena</a>
      </div>
    `;
  }
};
</script>
