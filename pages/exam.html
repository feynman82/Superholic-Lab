<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    /* ── MASTERCLASS BLUEPRINT SKELETON ── */
    .blueprint-card {
      background: var(--glass);
      border: 2px dashed var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      font-family: 'JetBrains Mono', monospace; /* Technical draft feel */
      position: relative;
    }
    .blueprint-card::after {
      content: 'DRAFT PREVIEW';
      position: absolute; top: 1rem; right: 1rem;
      font-size: 0.6rem; color: var(--amber);
      border: 1px solid var(--amber); padding: 2px 6px; border-radius: 4px;
    }
    .blueprint-row {
      display: flex; justify-content: space-between;
      padding: var(--space-2) 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .blueprint-row span:first-child { color: var(--sage-light); }
    .blueprint-row span:last-child { color: var(--mint); font-weight: bold; }

    /* ── LINEAR WIZARD STATES ── */
    .wizard-step { display: none; }
    .wizard-step.is-active { display: block; animation: fadeIn 0.3s ease-in; }
    
    /* ── DESIGN GUARDIAN TOKENS ── */
    .btn-subject { border: 1.5px solid var(--glass-border); transition: all 0.2s; }
    .btn-subject:hover { border-color: var(--mint); transform: translateY(-2px); }
    .btn-subject.is-selected { border-color: var(--mint); background: rgba(57,255,179,0.1); }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="container flex-between">
      <div class="logo">Superholic Lab</div>
      <div id="exam-timer" class="text-mint font-mono font-bold"></div>
    </div>
  </header>

  <main class="container max-w-2xl py-12">
    <div id="exam-wizard">
      
      <div id="step-subject" class="wizard-step">
        <h1 class="text-2xl font-bold mb-4">Select Subject</h1>
        <div id="subject-grid" class="grid grid-cols-3 gap-4">
          <button class="btn-subject p-6 rounded-xl" data-subject="Mathematics">🔢 Math</button>
          <button class="btn-subject p-6 rounded-xl" data-subject="Science">🔬 Science</button>
          <button class="btn-subject p-6 rounded-xl" data-subject="English">📖 English</button>
        </div>
      </div>

      <div id="step-type" class="wizard-step">
        <div id="confirmation-banner" class="mb-6 p-4 bg-glass rounded-lg border border-mint text-sm">
          </div>
        
        <h2 class="text-xl font-bold mb-4">Choose Assessment Type</h2>
        <div id="type-selector" class="grid grid-cols-2 gap-3 mb-8">
          </div>

        <div class="blueprint-card mb-8">
          <h3 class="text-xs uppercase tracking-widest mb-4 opacity-50">Exam Blueprint</h3>
          <div id="blueprint-content">
            </div>
          <div class="mt-4 pt-4 border-t border-glass-border flex justify-between text-sm">
            <span>Estimated Duration:</span>
            <span id="blueprint-duration">-- mins</span>
          </div>
        </div>

        <button id="generate-btn" class="btn btn-primary w-full py-4">Generate Paper →</button>
      </div>

    </div>

    <div id="exam-paper" class="hidden">
      </div>
  </main>

  <script type="module">
    import { getSupabase } from '/js/supabase.js';

    const state = {
      level: null,
      subject: null,
      type: null,
      tier: 'single_subject'
    };

    async function init() {
      const sb = await getSupabase();
      const { data: { user } } = await sb.auth.getUser();
      
      // 1. Fetch User Credentials [cite: 2026-03-30]
      const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
      const { data: student } = await sb.from('students').select('*').eq('parent_id', user.id).single();

      state.level = student.level; // e.g., "Primary 4" [cite: 2026-03-30]
      state.tier = profile.subscription_tier;

      // 2. Linear Logic Branching [cite: 2026-03-30]
      if (state.tier === 'single_subject') {
        state.subject = student.selected_subject;
        showStep('step-type');
      } else {
        showStep('step-subject');
      }
      
      updateConfirmation();
    }

    function showStep(id) {
      document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('is-active'));
      document.getElementById(id).classList.add('is-active');
    }

    function updateConfirmation() {
      const banner = document.getElementById('confirmation-banner');
      banner.innerHTML = `Generating <strong>${state.level} ${state.subject || ''}</strong> assessment paper for <strong>${state.type || '...'}</strong>`;
      renderBlueprint();
    }

    function renderBlueprint() {
      const container = document.getElementById('blueprint-content');
      // Masterclass Logic: Auto-calculate types based on MOE standards [cite: 2026-03-29, 2026-03-30]
      const blueprint = state.subject === 'Science' 
        ? [{ label: 'Section A (MCQ)', count: 28 }, { label: 'Section B (Open-Ended)', count: 12 }]
        : [{ label: 'Section A (MCQ)', count: 15 }, { label: 'Section B (Short Ans)', count: 10 }, { label: 'Section C (Word Problems)', count: 5 }];

      container.innerHTML = blueprint.map(row => `
        <div class="blueprint-row">
          <span>${row.label}</span>
          <span>${row.count} Qs</span>
        </div>
      `).join('');
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
