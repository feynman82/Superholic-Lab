<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tutor — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- Analytics: ⚠️ CONFIGURE — sign up at plausible.io and add superholiclab.com -->
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  <!-- Auth guard: redirects to login if no session -->
  <script type="module">
    import { guardPage } from '/js/auth.js';
    await guardPage(true);
  </script>
</head>
<body class="has-bottom-nav">
  <header class="navbar is-scrolled">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">
          <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius:8px;flex-shrink:0;">
          Superholic Lab
        </a>
        <div class="navbar-actions">
          <a href="subjects.html" class="btn btn-secondary btn-sm">Practice Quiz</a>
        </div>
      </nav>
    </div>
  </header>

  <main style="padding: var(--space-6) 0 var(--space-16);">
    <div class="container" style="max-width:760px;">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">AI Tutor</span>
      </nav>

      <!-- Trial limit banner (hidden until limit hit) -->
      <div id="tutor-limit-banner" class="alert alert-info mt-4" hidden>
        You've used your 10 free AI tutor messages today.
        <a href="pricing.html" style="font-weight:600;">Upgrade to continue</a> with unlimited access.
      </div>

      <!-- Chat card -->
      <div class="card no-hover mt-6" style="overflow:hidden;">

        <!-- Card header: avatar + subject label + online badge -->
        <div class="card-header" style="border-bottom:1px solid var(--border);">
          <div class="flex items-center gap-3" style="flex-wrap:wrap; row-gap:var(--space-4);">
            <!-- Tutor avatar -->
            <div style="width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M10 2C6.13 2 3 5.13 3 9c0 2.06.83 3.93 2.18 5.28L4 18l3.72-1.18A6.95 6.95 0 0010 17c3.87 0 7-3.13 7-7s-3.13-8-7-8z" fill="white"/>
              </svg>
            </div>
            <div>
              <div style="font-weight:600;">AI Tutor</div>
              <div class="text-xs text-secondary" id="tutor-subject-label">Mathematics</div>
            </div>
            <span class="badge badge-success" style="margin-left:auto;">Online</span>
          </div>

          <!-- Subject selector tabs -->
          <div class="flex gap-2 mt-4" style="flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" data-subject="mathematics">Mathematics</button>
            <button class="btn btn-secondary btn-sm" data-subject="science">Science</button>
            <button class="btn btn-secondary btn-sm" data-subject="english">English</button>
          </div>

          <!-- Level selector -->
          <div class="flex items-center gap-3 mt-3">
            <label class="form-label" for="level-select" style="margin:0;white-space:nowrap;font-size:0.875rem;">Level:</label>
            <select id="level-select" class="form-input" style="max-width:160px;padding:0.4rem 0.75rem;height:auto;">
              <option value="primary-1">Primary 1</option>
              <option value="primary-2">Primary 2</option>
              <option value="primary-3">Primary 3</option>
              <option value="primary-4" selected>Primary 4</option>
              <option value="primary-5">Primary 5</option>
              <option value="primary-6">Primary 6</option>
            </select>
          </div>
        </div>

        <!-- Messages area -->
        <div
          class="chat-messages"
          id="chat-messages"
          style="height:400px;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);"
          aria-live="polite"
          aria-label="Chat messages"
        ></div>

        <!-- Input bar -->
        <div class="chat-input-bar" style="border-top:1px solid var(--border);">
          <input
            type="text"
            id="chat-input"
            class="chat-input"
            placeholder="Ask your tutor anything…"
            autocomplete="off"
            aria-label="Message input"
            maxlength="500"
          />
          <button class="btn btn-primary" id="chat-send" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Suggested starter questions -->
      <div class="mt-6">
        <p class="text-secondary text-sm" style="margin-bottom:var(--space-3);">Try asking:</p>
        <div class="flex gap-2" style="flex-wrap:wrap;" id="starter-prompts">
          <button class="btn btn-secondary btn-sm starter-prompt">How do I add fractions with different denominators?</button>
          <button class="btn btn-secondary btn-sm starter-prompt">Can you explain angles in a triangle?</button>
          <button class="btn btn-secondary btn-sm starter-prompt">What does the examiner look for in PSLE?</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. All rights reserved. 🇸🇬 Made in Singapore</p>
      </div>
    </div>
  </footer>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="../index.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Home</a>
    <a href="subjects.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Practise</a>
    <a href="tutor.html" class="bottom-nav-item is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>AI Tutor</a>
    <a href="progress.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progress</a>
  </nav>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/tutor.js"></script>
  <script>
    // Wire up starter prompt chips to the chat input
    document.querySelectorAll('.starter-prompt').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById('chat-input');
        if (input && !input.disabled) {
          input.value = btn.textContent;
          input.focus();
        }
      });
    });
  </script>
</body>
</html>
