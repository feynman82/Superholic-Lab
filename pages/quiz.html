<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
</head>
<body class="has-bottom-nav">
  <header class="navbar is-scrolled">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="8" fill="#4338ca"/>
            <path d="M8 14.5L12.5 19L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Superholic Lab
        </a>
        <div class="navbar-actions">
          <a href="subjects.html" class="btn btn-secondary btn-sm">← Change Subject</a>
        </div>
      </nav>
    </div>
  </header>

  <main style="padding: var(--space-8) 0 var(--space-16);">
    <div class="container" style="max-width:680px;">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="subjects.html">Subjects</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="quiz-breadcrumb">Quiz</span>
      </nav>

      <!-- Loading state -->
      <div id="quiz-loading" class="text-center mt-10" style="color:var(--text-secondary);">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true" style="display:block;margin:0 auto var(--space-4);">
          <circle cx="20" cy="20" r="16" stroke="var(--border)" stroke-width="4"/>
          <path d="M20 4a16 16 0 0 1 16 16" stroke="var(--primary)" stroke-width="4" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="0.9s" repeatCount="indefinite"/>
          </path>
        </svg>
        Loading questions…
      </div>

      <!-- Error state -->
      <div id="quiz-error" class="alert alert-danger mt-6" hidden></div>

      <!-- Quiz area -->
      <div id="quiz-area" hidden>
        <div class="quiz-progress">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div>
          </div>
          <span class="quiz-progress-label" id="quiz-progress-label">1 / 10</span>
        </div>

        <div class="card no-hover" id="quiz-card">
          <div class="card-body">
            <div class="flex gap-2 mb-4" style="flex-wrap:wrap;" id="quiz-meta"></div>
            <p class="quiz-question-text" id="quiz-question-text"></p>

            <!-- MCQ options -->
            <div class="quiz-options" id="quiz-options"></div>

            <!-- Fill in the blank -->
            <div id="quiz-fill-area" hidden>
              <input type="text" class="form-input" id="quiz-fill-input" placeholder="Type your answer here…" autocomplete="off" />
              <button class="btn btn-primary mt-4" id="quiz-fill-submit">Check Answer</button>
            </div>

            <!-- True / False -->
            <div id="quiz-tf-area" class="flex gap-4 mt-4" hidden>
              <button class="btn btn-secondary btn-full" id="quiz-tf-true" data-value="True">True</button>
              <button class="btn btn-secondary btn-full" id="quiz-tf-false" data-value="False">False</button>
            </div>

            <!-- Explanation / worked solution -->
            <div id="quiz-explanation" hidden></div>

            <!-- Next -->
            <button class="btn btn-primary btn-full mt-6" id="quiz-next" hidden>Next Question →</button>
          </div>
        </div>
      </div>

      <!-- Score screen -->
      <div id="quiz-score-screen" class="card no-hover" hidden></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. All rights reserved. 🇸🇬 Made in Singapore</p>
      </div>
    </div>
  </footer>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="../index.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Home</a>
    <a href="subjects.html" class="bottom-nav-item is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Practise</a>
    <a href="tutor.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>AI Tutor</a>
    <a href="progress.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progress</a>
  </nav>

  <script src="../js/auth.js"></script>
  <script src="../js/quiz.js"></script>
</body>
</html>
