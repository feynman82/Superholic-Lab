<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Lab — Superholic Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  
  <script type="module">
    import { guardPage } from '/js/auth.js';
    import { initAppShell } from '/js/app-shell.js';
    
    async function boot() {
      try {
        window.userProfile = await guardPage(true); 
        const runInit = () => {
          if (typeof initAppShell === 'function') initAppShell(window.userProfile); 
          if (typeof window.initQuizEngine === 'function') window.initQuizEngine();
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', runInit);
        } else {
          runInit();
        }
      } catch (err) {
        console.error('Boot sequence failed:', err);
      }
    }
    boot();
  </script>
</head>

<body id="mainBody" class="has-bottom-nav bg-page texture-light-grid">

<!-- ═══════════════════ GLOBAL NAVBAR (Darker Sage) ═══════════════════ -->
<header class="navbar justify-between bg-sage-dark" id="navbar">
  <a href="../index.html" class="flex items-center gap-2 font-display text-2xl text-white">
    <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius: var(--radius-sm); flex-shrink:0;">
    Superholic Lab
  </a>
  <div class="navbar-actions flex items-center gap-4">
    <div id="auth-header-container"></div>
    <button class="navbar-toggle" id="navToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="navbar-mobile" id="navDropdown">
    <a href="../index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact Support</a>
    <a href="#" id="navSignOut" style="color: var(--brand-rose);">Sign Out</a>
  </div>
</header>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<main id="app" class="container py-10 flex flex-col items-center" style="padding-top: calc(64px + var(--space-10)); min-height: 80vh; max-width: 800px;"></main>

<!-- ═══════════════════ BOTTOM NAV ═══════════════════ -->
<nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
  <a href="subjects.html" class="bottom-nav-item is-active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Practise
  </a>
  <a href="tutor.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    AI Tutor
  </a>
  <a href="exam.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    Exam
  </a>
  <a href="progress.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </a>
</nav>

<script src="../js/supabase-client.js"></script>
<script>
// ── ROBUST EVENT DELEGATION FOR NAVBAR ──
document.addEventListener('click', (e) => {
  const toggleBtn = e.target.closest('#navToggle');
  const dropdown = document.getElementById('navDropdown');
  
  // Toggle Mobile Menu
  if (toggleBtn && dropdown) {
    e.stopPropagation();
    dropdown.classList.toggle('is-open');
    toggleBtn.classList.toggle('is-active'); 
    return;
  }

  // Close Mobile Menu on outside click
  if (dropdown && dropdown.classList.contains('is-open') && !dropdown.contains(e.target)) {
    dropdown.classList.remove('is-open');
    const actualToggle = document.getElementById('navToggle');
    if (actualToggle) actualToggle.classList.remove('is-active');
  }

  // Handle Sign Out
  const signOutBtn = e.target.closest('#navSignOut');
  if (signOutBtn) {
    e.preventDefault();
    getSupabase().then(async (sb) => {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    });
  }
});

// Auto-Light Up Active Nav Icon
(function() {
  const currentPath = window.location.pathname;
  document.querySelectorAll('.bottom-nav-item').forEach(link => {
    const href = link.getAttribute('href');
    if (href && currentPath.includes(href)) {
      link.classList.add('is-active');
    }
  });
})();

window.initQuizEngine = function() {
  'use strict';

  const state = {
    phase: 'LOAD',
    questions: [],
    currentIndex: 0,
    streak: 0,
    maxStreak: 0,
    score: 0,
    answers: {},       
    drawings: {},      
    isAnswered: false, 
    feedback: null,
    currentType: null,
    quizStartTime: null
  };

  const app = document.getElementById('app');
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function titleCase(s) { return s.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

  function render() {
    switch(state.phase) {
      case 'LOAD': renderLoading(); break;
      case 'QUIZ': renderQuiz(); break;
      case 'DONE': renderResults(); break;
    }
  }

  function renderLoading() {
    app.innerHTML = `<div class="card p-10 flex flex-col items-center w-full max-w-[600px]"><div class="spinner-sm mb-4"></div><h2 class="font-display text-2xl text-main">Preparing Training Lab...</h2><p class="text-sm text-muted mt-2">Loading MOE-aligned questions</p></div>`;
  }

  function renderQuiz() {
    if (state.questions.length === 0) {
      app.innerHTML = `<div class="card p-10 text-center max-w-[600px] w-full hover-lift"><div class="text-4xl mb-4">🕵️</div><h2 class="font-display text-2xl text-main">No questions found!</h2><p class="text-muted text-sm my-4">Miss Wena hasn't added questions for this specific combination yet. Check back soon!</p><button class="btn btn-primary hover-lift" onclick="window.location.href='subjects.html'">Return to Subjects</button></div>`;
      return;
    }

    const q = state.questions[state.currentIndex];
    const isFirst = state.currentIndex === 0;
    const isLast = state.currentIndex === state.questions.length - 1;
    
    let inputUi = '';
    const savedAns = state.answers[state.currentIndex] || '';

    if (q.type === 'mcq') {
      const letters = ['A','B','C','D'];
      inputUi = q.options.map((opt, i) => {
        const isSel = savedAns === letters[i];
        let extraStyles = '';
        if (state.isAnswered) {
           if (letters[i] === q.correct_answer) extraStyles = 'border-color: var(--brand-mint); background: rgba(5,150,105,0.1);';
           else if (isSel) extraStyles = 'border-color: var(--brand-error); background: rgba(220,38,38,0.1); opacity: 0.8;';
           else extraStyles = 'opacity: 0.5; pointer-events: none;';
        }
        return `
          <div class="mcq-opt ${isSel ? 'is-sel' : ''}" style="${extraStyles} ${state.isAnswered ? 'pointer-events:none;' : ''}" onclick="window.selectMcq('${letters[i]}')">
            <span class="mcq-badge">${letters[i]}</span><span class="font-medium text-main">${esc(opt)}</span>
          </div>`;
      }).join('');
    } else {
      const isDrawMode = state.drawings[state.currentIndex] && state.drawings[state.currentIndex] !== 'text';
      inputUi = `
        <div class="flex justify-end gap-2 mb-2">
          <button class="btn btn-sm ${!isDrawMode ? 'btn-secondary bg-sage-dark text-white' : 'btn-ghost'}" onclick="window.setMode('text')" ${state.isAnswered ? 'disabled' : ''}>⌨️ Type</button>
          <button class="btn btn-sm ${isDrawMode ? 'btn-secondary bg-sage-dark text-white' : 'btn-ghost'}" onclick="window.setMode('draw')" ${state.isAnswered ? 'disabled' : ''}>✏️ Pen Tool</button>
        </div>
        ${!isDrawMode 
          ? `<textarea id="qInput" class="form-input w-full p-4" rows="4" placeholder="Your answer..." ${state.isAnswered ? 'disabled' : ''}>${esc(savedAns)}</textarea>`
          : `<div class="scratchpad-container">
               <canvas id="scratchpadCanvas" class="scratchpad-canvas" ${state.isAnswered ? 'style="pointer-events:none;"' : ''}></canvas>
               ${!state.isAnswered ? `<div class="scratchpad-tools"><button class="btn btn-sm btn-ghost bg-surface" onclick="window.clearCanvas()">🗑️ Clear</button></div>` : ''}
             </div>
             <input type="text" id="qInput" class="form-input mt-4" placeholder="Final Answer" value="${esc(savedAns)}" ${state.isAnswered ? 'disabled' : ''}>`
        }
      `;
    }

    let feedbackHtml = '';
    if (state.isAnswered && state.feedback) {
      const isCorrect = state.feedback.status === 'correct';
      const fbColor = isCorrect ? 'var(--brand-mint)' : 'var(--brand-error)';
      const fbBg = isCorrect ? 'rgba(5,150,105,0.1)' : 'rgba(220,38,38,0.1)';
      const title = isCorrect ? '🎉 Spot on!' : '💡 Miss Wena says:';
      
      feedbackHtml = `
        <div class="feedback-panel is-open p-6 rounded-lg" style="background: ${fbBg}; border-left: 4px solid ${fbColor};">
          <h4 class="font-bold text-lg mb-2" style="color: ${fbColor};">${title}</h4>
          <p class="text-sm text-main leading-relaxed">
            ${esc(state.feedback.text)}
          </p>
          ${!isCorrect && q.correct_answer ? `<div class="mt-4 text-sm font-bold text-main">Correct Answer: ${esc(q.correct_answer)}</div>` : ''}
        </div>
      `;
    }

    app.innerHTML = `
      <div class="w-full max-w-[680px]">
        <!-- Top Bar: Progress & Streak -->
        <div class="flex justify-between items-center mb-6">
          <div class="flex flex-col gap-1">
            <div class="text-xs font-bold text-muted uppercase">Question ${state.currentIndex + 1} of ${state.questions.length}</div>
            <div class="quiz-progress-bar" style="width: 120px; height: 6px;"><div class="quiz-progress-fill" style="width: ${((state.currentIndex)/state.questions.length)*100}%; background: var(--brand-rose);"></div></div>
          </div>
          <div class="badge ${state.streak >= 3 ? 'badge-amber' : 'badge-info'}" style="font-size: 1rem; padding: 6px 12px;">
            <span class="${state.streak > 0 ? 'streak-fire' : ''} mr-1">🔥</span> Streak: ${state.streak}
          </div>
        </div>

        <!-- Main Card -->
        <div class="card p-8 hover-lift w-full relative">
          <div class="badge badge-info absolute top-0 left-8" style="transform: translateY(-50%);">${esc(titleCase(q.topic || 'Mixed'))}</div>
          
          <h3 class="text-xl font-bold text-main mb-6 mt-2 leading-relaxed">${esc(q.question_text)}</h3>
          
          <div class="w-full">${inputUi}</div>
          
          ${feedbackHtml}

          <!-- Action Bar -->
          <div class="flex justify-between items-center mt-8 pt-6 border-t border-light">
            <button class="btn btn-ghost" onclick="window.navQuiz(-1)" ${isFirst ? 'style="visibility:hidden;"' : ''}>← Previous</button>
            
            ${!state.isAnswered 
              ? `<button class="btn btn-primary hover-lift" onclick="window.checkAnswer()">Check Answer</button>`
              : `<button class="btn btn-primary hover-lift" onclick="window.navQuiz(1)">${isLast ? 'Finish Lab →' : 'Next Question →'}</button>`
            }
          </div>
        </div>
      </div>
    `;

    if (document.getElementById('scratchpadCanvas')) {
      initCanvas(state.currentIndex);
    }
  }

  // ── INTERACTIONS ──
  window.selectMcq = (letter) => {
    if (state.isAnswered) return;
    state.answers[state.currentIndex] = letter;
    render();
  };

  window.setMode = (mode) => {
    if (state.isAnswered) return;
    saveInputState();
    state.drawings[state.currentIndex] = mode === 'draw' ? 'init' : 'text';
    render();
  };

  function saveInputState() {
    const q = state.questions[state.currentIndex];
    if (q.type !== 'mcq') {
      const inp = document.getElementById('qInput');
      if (inp) state.answers[state.currentIndex] = inp.value;
    }
    const canvas = document.getElementById('scratchpadCanvas');
    if (canvas) state.drawings[state.currentIndex] = canvas.toDataURL();
  }

  window.navQuiz = (dir) => {
    if (!state.isAnswered && dir > 0) return; 
    
    if (dir < 0) {
       saveInputState();
       state.currentIndex--;
       state.isAnswered = true; 
       state.feedback = null; 
       render();
       return;
    }

    if (state.currentIndex === state.questions.length - 1) {
      state.phase = 'DONE';
      render();
      return;
    }

    saveInputState();
    state.currentIndex++;
    state.isAnswered = !!state.answers[state.currentIndex]; 
    state.feedback = null;
    render();
  };

  window.checkAnswer = () => {
    saveInputState();
    const q = state.questions[state.currentIndex];
    const ans = state.answers[state.currentIndex];
    
    if (!ans && q.type === 'mcq') {
      alert("Please select an answer!");
      return;
    }

    let isCorrect = false;
    let fbText = "";

    if (q.type === 'mcq') {
      isCorrect = ans === q.correct_answer;
      fbText = isCorrect ? "Perfectly executed!" : (q.wrong_explanations?.[ans] || `The correct answer was ${q.correct_answer}.`);
    } else {
      const norm = (s) => String(s || '').toLowerCase().replace(/\s/g,'');
      isCorrect = norm(ans) === norm(q.correct_answer);
      fbText = isCorrect ? "Excellent logic!" : (q.model_answer || `The expected answer is ${q.correct_answer}. Please review your working steps.`);
    }

    if (isCorrect) {
      state.score++;
      state.streak++;
      if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    } else {
      state.streak = 0; 
    }

    state.isAnswered = true;
    state.feedback = { status: isCorrect ? 'correct' : 'wrong', text: fbText };
    render();
  };

  function renderResults() {
    saveQuizResult(); 
    
    const pct = Math.round((state.score / state.questions.length) * 100);
    app.innerHTML = `
      <div class="card p-10 flex flex-col items-center text-center max-w-[600px] w-full hover-lift border-t-4 border-mint" style="border-top: 4px solid var(--brand-mint);">
        <h1 class="font-display text-4xl text-main mb-2">Training Complete!</h1>
        <p class="text-muted text-lg mb-6">You've successfully completed the lab session.</p>
        
        <div class="flex gap-6 mb-8 w-full justify-center">
          <div class="card p-6 flex-1 max-w-[200px]" style="background: var(--bg-elevated); border: none;">
            <div class="text-sm font-bold text-muted uppercase">Score</div>
            <div class="font-display text-5xl text-success mt-2">${pct}%</div>
            <div class="text-sm text-main mt-1">${state.score} / ${state.questions.length} Correct</div>
          </div>
          <div class="card p-6 flex-1 max-w-[200px]" style="background: rgba(217, 119, 6, 0.1); border: none;">
            <div class="text-sm font-bold text-amber uppercase">Best Streak</div>
            <div class="font-display text-5xl text-amber mt-2">🔥 ${state.maxStreak}</div>
            <div class="text-sm text-amber mt-1">In a row!</div>
          </div>
        </div>

        <div class="flex gap-4">
          <button class="btn btn-primary" onclick="window.location.href='subjects.html'">Train Another Topic</button>
          <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">Mission Control</button>
        </div>
      </div>
    `;
  }

  // ── DATA ENGINE (Restored static file logic) ──
  function resolveFile(subject, level, topic) {
    const broadMap = {
      'primary-1:mathematics': '../data/questions/p1-mathematics-whole-numbers.json',
      'primary-2:mathematics': '../data/questions/p2-mathematics.json',
      'primary-2:english':     '../data/questions/p2-english.json',
      'primary-4:mathematics': '../data/questions/p4-mathematics.json',
      'primary-4:science':     '../data/questions/p4-science.json',
      'primary-4:english':     '../data/questions/p4-english.json',
      'primary-5:mathematics': '../data/questions/p5-mathematics.json',
      'primary-5:science':     '../data/questions/p5-science.json',
    };

    if (subject === 'english' && state.currentType && ['cloze', 'editing'].includes(state.currentType)) {
      const levelShort = level.replace('primary-', 'p');
      return `../data/questions/${levelShort}-english-${state.currentType}.json`;
    }

    const key = `${level}:${subject}`;
    const broadPath = broadMap[key];
    if (!broadPath) return null;

    if (topic && topic !== 'all') {
      const levelShort = level.replace('primary-', 'p');
      return `../data/questions/${levelShort}-${subject}-${topic}.json`;
    }

    return broadPath;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function init() {
    try {
      const params = new URLSearchParams(window.location.search);
      const subject = params.get('subject') || 'mathematics';
      const levelSlug = params.get('level') || 'primary-4';
      const topic = params.get('topic');
      const type = params.get('type');
      
      state.currentType = type;
      
      const filePath = resolveFile(subject, levelSlug, topic);
      if (!filePath) {
        state.questions = [];
        render();
        return;
      }

      const res = await fetch(filePath);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const all = await res.json();
      
      const pool = type && type !== 'mixed' ? all.filter(q => q.type === type) : all;
      
      state.questions = shuffle(pool).slice(0, 10);
      state.quizStartTime = Date.now();
      render();
    } catch (err) {
      console.warn("Local fetch failed:", err);
      state.questions = [];
      render();
    }
  }

  // ── SAVE RESULTS ──
  async function saveQuizResult() {
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');
    if (!studentId) return;

    try {
      const sb = await getSupabase();
      await sb.from('exam_results').insert({
        student_id: studentId,
        subject: params.get('subject') || 'mathematics',
        level: params.get('level') || 'primary-4',
        exam_type: 'QUIZ',
        score: state.score,
        total_marks: state.questions.length,
        questions_attempted: state.questions.length,
        time_taken: state.quizStartTime ? Math.round((Date.now() - state.quizStartTime) / 1000) : null
      });
    } catch (e) {
      console.error('Failed to save quiz result:', e);
    }
  }

  // ── CANVAS LOGIC ──
  let ctx, isDrawing = false;
  function initCanvas(qid) {
    const canvas = document.getElementById('scratchpadCanvas');
    if (!canvas) return;
    
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 300;
    
    ctx = canvas.getContext('2d');
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2C3E3A';

    if (state.drawings[qid] && state.drawings[qid] !== 'init' && state.drawings[qid] !== 'text') {
      let img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = state.drawings[qid];
    }

    if (state.isAnswered) return; 

    const getPos = (e) => {
      const r = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x, y };
    };

    const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
    const draw = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
    const stop = () => { if(isDrawing) { isDrawing = false; state.drawings[qid] = canvas.toDataURL(); } };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stop);
    canvas.addEventListener('mouseout', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stop);
  }

  window.clearCanvas = () => {
    if(ctx && !state.isAnswered) {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      state.drawings[state.currentIndex] = ctx.canvas.toDataURL();
    }
  };

  // ── DATA FETCHING ──
  async function init() {
    try {
      const params = new URLSearchParams(window.location.search);
      const subject = params.get('subject') || 'mathematics';
      const levelSlug = params.get('level') || 'primary-4';
      const topic = params.get('topic');
      const type = params.get('type');
      const studentId = params.get('student');
      
      state.currentType = type;

      // Propagate student state and hide exam for P1/P2
      if (studentId) {
        const isJunior = levelSlug.includes('primary-1') || levelSlug.includes('primary-2') || levelSlug === 'p1' || levelSlug === 'p2';
        
        document.querySelectorAll('.bottom-nav-item').forEach(link => {
          const url = new URL(link.href, window.location.origin);
          url.searchParams.set('student', studentId);
          link.href = url.pathname + url.search;
          
          if (isJunior && link.getAttribute('href').includes('exam.html')) {
            link.style.display = 'none';
          }
        });
        
        if (isJunior) {
          const nav = document.getElementById('bottomNav');
          if (nav) nav.style.justifyContent = 'space-evenly';
        }
      }
      
      const filePath = resolveFile(subject, levelSlug, topic);
      if (!filePath) {
        state.questions = [];
        state.phase = 'QUIZ';
        render();
        return;
      }

      const res = await fetch(filePath);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const all = await res.json();
      
      const pool = type && type !== 'mixed' ? all.filter(q => q.type === type) : all;
      
      state.questions = shuffle(pool).slice(0, 10);
      state.quizStartTime = Date.now();
      state.phase = 'QUIZ';
      render();
    } catch (err) {
      console.warn("Local fetch failed:", err);
      // FIXED: Removed dummy fallback and correctly transition phase so spinner stops
      state.questions = [];
      state.phase = 'QUIZ';
      render();
    }
  }

  setTimeout(init, 100);
};
</script>
</body>
</html>
