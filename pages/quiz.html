<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Master — Superholic Lab</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  <script type="module" src="../js/quiz.js"></script>
   <script type="module">
    import { guardPage } from '/js/auth.js';
    await guardPage(false); 
  </script>
  <script type="module">
    import { guardPage } from '/js/auth.js';
    import { initAppShell } from '/js/app-shell.js';
    
    // We fetch the profile/session exactly ONE time here.
    const profile = await guardPage(true); 
    
    // Pass it to the shell to instantly set up the Navbar and CSS padding.
    // (If profile exists, they are logged in. If null, they are guest).
    initAppShell(profile); 
  </script>
</head>

<body id="mainBody">

<header class="navbar navbar-homepage" id="navbar" style="justify-content: space-between;">
    
    <a href="../index.html" class="navbar-logo">
      <img src="../assets/logo.svg" width="32" height="32" alt="Superholic Lab">
      Superholic Lab
    </a>

    <div class="navbar-actions">
      <div id="auth-header-container">
        <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
      </div>

      <button class="navbar-toggle" id="navToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="navbar-mobile" id="navDropdown">
      <div class="container" id="navLinks">
        <a href="../index.html">Home</a>
        <a href="../pages/about.html">About Us</a>
        <a href="../pages/pricing.html">Pricing</a>
        <a href="../pages/contact.html">Contact Support</a>
        <a href="../pages/signup.html" id="navSignUp">Start Free Trial</a>
      </div>
    </div>
  </header>

<main class="page-content" style="margin-top: 68px; min-height: 80vh;">
    <div class="container" style="max-width:680px;">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="subjects.html">Subjects</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="quiz-breadcrumb">Quiz</span>
      </nav>

      <!-- Loading state -->
      <div id="quiz-loading" class="text-center mt-10" style="color:var(--text-secondary);">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true" style="display:block;margin:0 auto var(--space-4);">
          <circle cx="20" cy="20" r="16" stroke="var(--border)" stroke-width="4"/>
          <path d="M20 4a16 16 0 0 1 16 16" stroke="var(--primary)" stroke-width="4" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="0.9s" repeatCount="indefinite"/>
          </path>
        </svg>
        Loading questions…
      </div>

      <!-- Error state -->
      <div id="quiz-error" class="alert alert-danger mt-6" hidden></div>

      <!-- Quiz area -->
      <div id="quiz-area" hidden>
        <div class="quiz-progress">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div>
          </div>
          <span class="quiz-progress-label" id="quiz-progress-label">1 / 10</span>
        </div>

        <div class="card no-hover" id="quiz-card">
          <div class="card-body">
            <div class="flex gap-2 mb-4" style="flex-wrap:wrap;" id="quiz-meta"></div>
            <p class="quiz-question-text" id="quiz-question-text"></p>

            <!-- MCQ options -->
            <div class="quiz-options" id="quiz-options"></div>

            <!-- Short answer (renamed from fill_blank, MOE terminology) -->
            <div id="quiz-short-ans-area" hidden>
              <input type="text" class="form-input quiz-short-ans-input" id="quiz-short-ans-input" placeholder="Type your answer here…" autocomplete="off" />
              <button class="btn btn-primary mt-4" id="quiz-short-ans-submit">Check Answer</button>
            </div>

            <!-- Word problem (multi-part, not auto-graded) -->
            <div id="quiz-word-problem-area" hidden>
              <div id="quiz-wp-parts"></div>
              <button class="btn btn-primary mt-4" id="quiz-wp-reveal">Show Model Answer</button>
              <div id="quiz-wp-model" hidden></div>
            </div>

            <!-- Open-ended (Science written answer, not auto-graded) -->
            <div id="quiz-open-ended-area" hidden>
              <textarea class="form-input" id="quiz-oe-input" rows="5" placeholder="Write your explanation here…"></textarea>
              <button class="btn btn-primary mt-4" id="quiz-oe-reveal">See Model Answer</button>
              <div id="quiz-oe-model" hidden></div>
            </div>

            <!-- Cloze passage (auto-graded per blank) -->
            <div id="quiz-cloze-area" hidden>
              <div id="quiz-cloze-passage" class="quiz-cloze-passage"></div>
              <button class="btn btn-primary mt-4" id="quiz-cloze-check">Check Answers</button>
            </div>

            <!-- Editing exercise (auto-graded per line) -->
            <div id="quiz-editing-area" hidden>
              <div id="quiz-editing-passage"></div>
              <button class="btn btn-primary mt-4" id="quiz-editing-check">Check Answers</button>
            </div>

            <!-- Explanation / worked solution -->
            <div id="quiz-explanation" hidden></div>

            <!-- Next -->
            <button class="btn btn-primary btn-full mt-6" id="quiz-next" hidden>Next Question →</button>
          </div>
        </div>
      </div>

      <!-- Score screen -->
      <div id="quiz-score-screen" class="card no-hover" hidden></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. 🇸🇬 Made in Singapore</p>
        <div class="flex gap-4">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </footer>

  <nav class="bottom-nav" id="bottomNav" hidden>
    <a href="subjects.html" class="bottom-nav-item is-active" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Practise
    </a>
    <a href="tutor.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      AI Tutor
    </a>
    <a href="exam.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
      Exam
    </a>
    <a href="progress.html" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </a>
  </nav>

  <script src="../js/supabase-client.js"></script>
</body>
</html>
