<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
</head>

<body class="bg-page texture-light-grid flex items-center justify-center" style="min-height: 100vh; padding: var(--space-4);">

  <main class="card p-8 w-full hover-lift" style="max-width: 420px; background: var(--bg-surface);">
    
    <!-- Logo & Header -->
    <div class="flex flex-col items-center text-center mb-6">
      
      <!-- Dark Sage Banner for Logo Contrast -->
      <div class="w-full bg-sage-dark mb-6 py-3 flex justify-center items-center" style="border-radius: var(--radius-md); border-bottom: 3px solid var(--brand-rose);">
        <a href="../index.html" class="flex items-center gap-2 font-display text-2xl text-white" style="text-decoration: none;">
          <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius: var(--radius-sm); flex-shrink:0;" style="color: var(--text-logo);">
          Superholic Lab
        </a>
      </div>
      
      <h1 class="font-display text-3xl text-main mb-2">Welcome back</h1>
      <p class="text-sm text-muted">Log in to continue your learning journey.</p>
    </div>

    <!-- Alert Box (Used for Errors and Success messages) -->
    <div id="errorMsg" class="mb-4 p-3 text-sm text-danger font-bold rounded" style="display: none; background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.2);"></div>

    <!-- Login Form -->
    <div class="flex flex-col gap-4 mb-6">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-bold text-muted" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@email.com" autocomplete="email" />
      </div>

      <div class="flex flex-col gap-1">
        <div class="flex justify-between items-center">
          <label class="text-sm font-bold text-muted" for="password">Password</label>
          <a href="#" onclick="handleForgotPassword(event)" class="text-xs text-rose" style="text-decoration: none; font-weight: 600;">Forgot password?</a>
        </div>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn btn-primary w-full hover-lift mb-6" id="loginBtn" onclick="handleLogin()">Log in</button>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1" style="height: 1px; background: var(--border-light);"></div>
      <div class="text-xs text-muted font-bold uppercase tracking-wider">or continue with</div>
      <div class="flex-1" style="height: 1px; background: var(--border-light);"></div>
    </div>

    <!-- OAuth Buttons -->
    <div class="flex flex-col gap-3 mb-6">
      <button class="btn btn-secondary w-full flex items-center justify-center gap-2 hover-lift" id="googleBtn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Footer -->
    <div class="text-center text-sm text-muted">
      Don't have an account? <a href="signup.html" class="text-rose font-bold" style="text-decoration: none;">Sign up</a>
    </div>

  </main>

  <!-- supabase-client.js must load before auth.js module so getSupabase() is defined -->
  <script src="/js/supabase-client.js"></script>
  <script type="module">
    import { signIn, signInWithGoogle } from '/js/auth.js';

    function showMessage(msg, isSuccess = false) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      
      if (isSuccess) {
        el.style.background = 'rgba(5, 150, 105, 0.1)';
        el.style.borderColor = 'rgba(5, 150, 105, 0.2)';
        el.style.color = 'var(--brand-mint)';
      } else {
        el.style.background = 'rgba(220, 38, 38, 0.1)';
        el.style.borderColor = 'rgba(220, 38, 38, 0.2)';
        el.style.color = 'var(--brand-error)';
      }
    }

    window.handleLogin = async function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      document.getElementById('errorMsg').style.display = 'none';
      if (!email || !password) { showMessage('Please fill in both fields.'); return; }

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        await signIn(email, password);
      } catch (err) {
        showMessage(err.message || 'Login failed. Please check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    };

    // Password Reset Trigger
    window.handleForgotPassword = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      
      document.getElementById('errorMsg').style.display = 'none';
      
      if (!email) {
        showMessage('Please enter your email address in the box above, then click "Forgot password?".');
        return;
      }

      const btn = document.getElementById('loginBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Sending reset link...';

      try {
        const sb = await getSupabase();
        
        // This is the page the user will land on when they click the email link.
        // It must be registered in your Supabase Auth "Redirect URLs".
        const redirectUrl = window.location.origin + '/pages/update-password.html';
        
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: redirectUrl,
        });

        if (error) throw error;

        showMessage('Reset link sent! Please check your email.', true);
      } catch (err) {
        showMessage(err.message || 'Could not send reset link. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    };

    window.handleGoogle = async function () {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('googleBtn').disabled = true;
      try {
        await signInWithGoogle();
      } catch (err) {
        showMessage('Google sign-in failed. Please try again.');
        document.getElementById('googleBtn').disabled = false;
      }
    };

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>
</body>
</html>
