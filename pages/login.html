<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="/index.html" class="navbar-logo"><img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius:8px;flex-shrink:0;">
    Superholic Lab</a>
    <br>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to continue your learning journey.</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">Log in</button>

    <div class="divider">or continue with</div>

    <div class="oauth-buttons">
      <button class="btn-oauth" id="googleBtn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
<!--
      <button class="btn-oauth apple" id="appleBtn" onclick="handleApple()">
        <svg width="17" height="20" viewBox="0 0 17 20" fill="none"><path d="M14.0965 10.6145C14.0786 8.46 15.8788 7.41698 15.9609 7.36558C14.9399 5.87986 13.3538 5.67768 12.8046 5.65938C11.4611 5.52166 10.1615 6.46594 9.47722 6.46594C8.77926 6.46594 7.72498 5.67286 6.58636 5.6957C5.11836 5.71854 3.74798 6.57114 2.99784 7.89834C1.45224 10.5979 2.60296 14.5826 4.08578 16.7785C4.82784 17.8573 5.69574 19.0655 6.8435 19.0197C7.96298 18.9697 8.3785 18.289 9.72358 18.289C11.0573 18.289 11.4454 19.0197 12.6159 18.9925C13.8226 18.9697 14.5694 17.9053 15.2932 16.8174C16.1565 15.5788 16.5034 14.3654 16.5171 14.3012C16.4898 14.2927 14.1176 13.4161 14.0965 10.6145Z" fill="white"/><path d="M12.0084 4.26234C12.6136 3.51566 13.0291 2.48976 12.913 1.45C12.0268 1.48842 10.9202 2.05614 10.2921 2.78568C9.73506 3.42714 9.23752 4.49342 9.36856 5.49476C10.3587 5.56986 11.3898 4.99788 12.0084 4.26234Z" fill="white"/></svg>
        Continue with Apple
      </button>
-->      
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/pages/signup.html">Sign up</a>
    </div>
  </div>

  <!-- supabase-client.js must load before auth.js module so getSupabase() is defined -->
  <script src="/js/supabase-client.js"></script>
  <script type="module">
    import { signIn, signInWithGoogle, signInWithApple } from '/js/auth.js';

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    window.handleLogin = async function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      document.getElementById('errorMsg').style.display = 'none';
      if (!email || !password) { showError('Please fill in both fields.'); return; }

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        await signIn(email, password);
      } catch (err) {
        showError(err.message || 'Login failed. Please check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    };

    window.handleGoogle = async function () {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('googleBtn').disabled = true;
      try {
        await signInWithGoogle();
      } catch (err) {
        showError('Google sign-in failed. Please try again.');
        document.getElementById('googleBtn').disabled = false;
      }
    };

    window.handleApple = async function () {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('appleBtn').disabled = true;
      try {
        await signInWithApple();
      } catch (err) {
        showError('Apple sign-in failed. Please try again.');
        document.getElementById('appleBtn').disabled = false;
      }
    };

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>
</body>
</html>
