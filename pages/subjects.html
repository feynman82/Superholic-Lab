<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Subject — Superholic Lab</title>
  <meta name="description" content="Choose a subject and topic to start practising MOE-aligned questions." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
  
  <script defer data-domain="superholiclab.com" src="https://plausible.io/js/script.js"></script>
  
  <script type="module">
    import { guardPage } from '/js/auth.js';
    import { initAppShell } from '/js/app-shell.js';
    
    async function boot() {
      try {
        window.userProfile = await guardPage(true); 
        const runInit = () => {
          if (typeof initAppShell === 'function') initAppShell(window.userProfile); 
          if (typeof window.initSubjectsEngine === 'function') window.initSubjectsEngine();
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', runInit);
        } else {
          runInit();
        }
      } catch (err) {
        console.error('Boot sequence failed:', err);
      }
    }
    boot();
  </script>
</head>

<body id="mainBody" class="has-bottom-nav bg-page texture-light-grid">

<!-- ═══════════════════ GLOBAL NAVBAR (Darker Sage) ═══════════════════ -->
<header class="navbar justify-between bg-sage-dark" id="navbar">
  <a href="../index.html" class="flex items-center gap-2 font-display text-2xl text-white">
    <img src="../assets/logo.svg" width="32" height="32" alt="" aria-hidden="true" style="border-radius: var(--radius-sm); flex-shrink:0;">
    Superholic Lab
  </a>
  <div class="navbar-actions flex items-center gap-4">
    <div id="auth-header-container"></div>
    <button class="navbar-toggle" id="navToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="navbar-mobile" id="navDropdown">
    <a href="../index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact Support</a>
    <a href="#" id="navSignOut" style="color: var(--brand-rose);">Sign Out</a>
  </div>
</header>

<!-- ═══════════════════ MAIN WIZARD APP ═══════════════════ -->
<main id="app" class="container py-10 flex flex-col items-center" style="padding-top: calc(64px + var(--space-10)); min-height: 80vh; max-width: 800px;"></main>

<!-- ═══════════════════ GLOBAL FOOTER ═══════════════════ -->
<footer class="footer bg-sage-dark texture-whimsical pt-8 pb-8" style="position: relative;">
  <div class="footer-pet-track"><div class="walking-pet">🐈</div></div>
  <div class="container">
    <div class="footer-bottom">
      <div class="text-muted text-sm">© 2026 Superholic Lab. 🇸🇬 Made in Singapore</div>
      <div class="flex gap-4">
        <a href="privacy.html" class="text-muted" style="text-decoration:none;">Privacy</a>
        <a href="terms.html" class="text-muted" style="text-decoration:none;">Terms</a>
        <a href="contact.html" class="text-muted" style="text-decoration:none;">Contact</a>
      </div>
    </div>
  </div>
</footer>

<!-- ═══════════════════ BOTTOM NAV ═══════════════════ -->
<nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
  <a href="subjects.html" class="bottom-nav-item is-active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Practise
  </a>
  <a href="tutor.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    AI Tutor
  </a>
  <a href="exam.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    Exam
  </a>
  <a href="progress.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </a>
</nav>

<script src="../js/supabase-client.js"></script>
<script>
// ── ROBUST EVENT DELEGATION FOR NAVBAR ──
document.addEventListener('click', (e) => {
  const toggleBtn = e.target.closest('#navToggle');
  const dropdown = document.getElementById('navDropdown');
  
  if (toggleBtn && dropdown) {
    e.stopPropagation();
    dropdown.classList.toggle('is-open');
    toggleBtn.classList.toggle('is-active'); 
    return;
  }

  if (dropdown && dropdown.classList.contains('is-open') && !dropdown.contains(e.target)) {
    dropdown.classList.remove('is-open');
    const actualToggle = document.getElementById('navToggle');
    if (actualToggle) actualToggle.classList.remove('is-active');
  }

  const signOutBtn = e.target.closest('#navSignOut');
  if (signOutBtn) {
    e.preventDefault();
    getSupabase().then(async (sb) => {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    });
  }
});

// Auto-Light Up Active Nav Icon
(function() {
  const currentPath = window.location.pathname;
  document.querySelectorAll('.bottom-nav-item').forEach(link => {
    const href = link.getAttribute('href');
    if (href && currentPath.includes(href)) {
      link.classList.add('is-active');
    }
  });
})();

window.initSubjectsEngine = function() {
  'use strict';

  const TOPIC_MAP = {
    'primary-1:mathematics': ['whole-numbers'],
    'primary-3:science':     ['diversity'],
    'primary-4:mathematics': ['fractions','decimals','geometry','whole-numbers'],
    'primary-4:science':     ['heat','light','magnets','matter'],
    'primary-4:english':     ['grammar','cloze','editing','vocabulary','comprehension'],
    'primary-6:mathematics': ['fractions'],
    'primary-6:science':     ['cells'],
    'primary-6:english':     ['grammar','cloze','editing'],
  };

  const SYLLABUS_MAP = {
    'primary-1:mathematics': ['Whole Numbers', 'Addition and Subtraction', 'Length', 'Time', 'Money', 'Picture Graphs'],
    'primary-2:mathematics': ['Whole Numbers', 'Addition and Subtraction', 'Multiplication and Division', 'Length', 'Mass', 'Volume', 'Time', 'Money', 'Fractions', 'Picture Graphs'],
    'primary-3:mathematics': ['Whole Numbers', 'Addition and Subtraction', 'Multiplication and Division', 'Money', 'Length, Mass and Volume', 'Bar Graphs', 'Fractions', 'Time', 'Geometry', 'Area and Perimeter'],
    'primary-4:mathematics': ['Whole Numbers', 'Fractions', 'Decimals', 'Measurement', 'Geometry', 'Data Analysis'],
    'primary-5:mathematics': ['Whole Numbers', 'Fractions', 'Decimals', 'Percentage', 'Ratio', 'Geometry', 'Measurement', 'Volume', 'Data Analysis'],
    'primary-6:mathematics': ['Fractions', 'Percentage', 'Ratio', 'Speed', 'Measurement', 'Geometry', 'Algebra', 'Data Analysis', 'Pie Charts'],
    
    'primary-3:science': ['Diversity', 'Systems', 'Interactions'],
    'primary-4:science': ['Cycles', 'Energy', 'Heat', 'Light', 'Magnets', 'Matter'],
    'primary-5:science': ['Cycles', 'Systems', 'Energy', 'Interactions'],
    'primary-6:science': ['Interactions', 'Energy', 'Cells', 'Forces'],
    
    'primary-1:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze'],
    'primary-2:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze'],
    'primary-3:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze', 'Editing'],
    'primary-4:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze', 'Editing'],
    'primary-5:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze', 'Editing', 'Synthesis'],
    'primary-6:english': ['Grammar', 'Vocabulary', 'Comprehension', 'Cloze', 'Editing', 'Synthesis']
  };

  const TYPE_MAP = {
    mathematics: ['mcq','short_ans','word_problem'],
    science:     ['mcq','open_ended'],
    english:     ['mcq','cloze','editing'],
  };

  const ALL_TYPES = {
    mathematics: [{id: 'mcq', label: 'MCQ'}, {id: 'short_ans', label: 'Short Answer'}, {id: 'word_problem', label: 'Word Problem'}],
    science: [{id: 'mcq', label: 'MCQ'}, {id: 'open_ended', label: 'Open-Ended'}],
    english: [{id: 'mcq', label: 'MCQ'}, {id: 'cloze', label: 'Cloze'}, {id: 'editing', label: 'Editing'}, {id: 'comprehension', label: 'Comprehension'}]
  };

  const state = { phase: 'INIT', level: '', subject: '', tier: '', topic: '', qtype: '', studentId: null };
  const app = document.getElementById('app');

  function render() {
    if (state.phase === 'SUBJECT') renderSubject();
    else if (state.phase === 'TOPIC') renderTopic();
    else if (state.phase === 'TYPE') renderType();
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function titleCase(s) { return s.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

  function renderSubject() {
    const isJunior = state.level.toLowerCase().includes('primary 1') || state.level.toLowerCase().includes('primary 2');
    
    const subjects = [
      { id: 'mathematics', icon: '📐', label: 'Mathematics', tag: 'P1–P6' },
      ...(isJunior ? [] : [{ id: 'science', icon: '🔬', label: 'Science', tag: 'P3–P6' }]),
      { id: 'english', icon: '📖', label: 'English', tag: 'P1–P6' }
    ];

    const cards = subjects.map(s => {
      const locked = state.tier === 'single_subject' && s.id !== state.subject;
      return `
        <div class="card hover-lift flex flex-col items-center justify-center p-8 text-center ${locked ? 'opacity-50' : 'cursor-pointer'}" 
             ${locked ? '' : `onclick="window.pickSubject('${s.id}')"`}>
          <div class="text-4xl mb-4">${s.icon}</div>
          <h3 class="font-display text-2xl text-main">${s.label}</h3>
          <div class="badge ${locked ? 'badge-danger' : 'badge-info'} mt-2">${locked ? '🔒 Locked to Plan' : s.tag}</div>
        </div>`;
    }).join('');

    app.innerHTML = `
      <div class="text-center mb-8 w-full">
        <div class="badge badge-info mb-2">Step 1 of 3</div>
        <h1 class="font-display text-4xl text-main">Choose a Subject</h1>
        <p class="text-muted text-lg mt-2">${esc(state.level)} — Select your mission</p>
      </div>
      <div class="w-full" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6);">
        ${cards}
      </div>`;
  }

  window.pickSubject = (subj) => {
    state.subject = subj; state.topic = ''; state.qtype = ''; state.phase = 'TOPIC'; render();
  };

  function renderTopic() {
    const key = state.level.toLowerCase().replace(' ','-') + ':' + state.subject;
    const activeTopics = TOPIC_MAP[key] || [];
    const allTopicsForSubj = SYLLABUS_MAP[key] || [];
    const stepText = state.tier === 'single_subject' ? 'Step 1 of 2' : 'Step 2 of 3';

    const buildCard = (id, title, sub, isSelected, isLocked) => `
      <div class="card p-6 ${isLocked ? 'opacity-50' : 'cursor-pointer hover-lift'} flex flex-col justify-center text-center relative" 
           style="border: 2px solid ${isSelected ? 'var(--brand-mint)' : 'var(--border-light)'}; background: ${isSelected ? 'var(--bg-elevated)' : 'var(--bg-surface)'};"
           ${isLocked ? '' : `onclick="window.pickTopic('${id}')"`}>
        ${isLocked ? '<div class="absolute top-2 right-2 text-xs text-muted" title="More questions coming soon">🔒</div>' : ''}
        <div class="font-bold text-lg text-main">${esc(title)}</div>
        <div class="text-xs text-muted mt-1">${esc(sub)}</div>
      </div>`;

    const allBtn = buildCard('all', '📚 All Topics', 'Practise everything', state.topic === 'all', false);
    const topicBtns = allTopicsForSubj.map(t => {
      const slug = t.toLowerCase().replace(/ /g, '-');
      const isLocked = !activeTopics.includes(slug);
      return buildCard(slug, t, isLocked ? 'Coming soon' : 'Focused topic practice', state.topic === slug, isLocked);
    }).join('');

    app.innerHTML = `
      <div class="text-center mb-8 w-full">
        <div class="badge badge-info mb-2">${stepText}</div>
        <h1 class="font-display text-4xl text-main">Choose a Topic</h1>
        <p class="text-muted text-lg mt-2">${esc(titleCase(state.subject))} · ${esc(state.level)}</p>
      </div>
      <div class="w-full mb-8" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--space-4);">
        ${allBtn} ${topicBtns}
      </div>
      <div class="w-full flex flex-col items-center gap-4" style="max-width: 400px;">
        <button class="btn btn-primary btn-lg w-full hover-lift" ${!state.topic ? 'disabled' : ''} onclick="window.goToType()">Choose Question Type →</button>
        ${state.tier !== 'single_subject' ? `<button class="btn btn-ghost" onclick="window.goBack('SUBJECT')">← Back to Subjects</button>` : ''}
      </div>`;
  }

  window.pickTopic = (t) => { state.topic = t; render(); };
  window.goToType = () => { if (state.topic) { state.qtype = ''; state.phase = 'TYPE'; render(); } };

  function renderType() {
    const activeTypes = TYPE_MAP[state.subject] || [];
    const allTypesForSubj = ALL_TYPES[state.subject] || [];
    const stepText = state.tier === 'single_subject' ? 'Step 2 of 2' : 'Step 3 of 3';

    const buildCard = (id, title, sub, isSelected, isLocked) => `
      <div class="card p-6 ${isLocked ? 'opacity-50' : 'cursor-pointer hover-lift'} flex flex-col justify-center text-center relative" 
           style="border: 2px solid ${isSelected ? 'var(--brand-mint)' : 'var(--border-light)'}; background: ${isSelected ? 'var(--bg-elevated)' : 'var(--bg-surface)'};"
           ${isLocked ? '' : `onclick="window.pickType('${id}')"`}>
        ${isLocked ? '<div class="absolute top-2 right-2 text-xs text-muted" title="More questions coming soon">🔒</div>' : ''}
        <div class="font-bold text-lg text-main">${esc(title)}</div>
        <div class="text-xs text-muted mt-1">${esc(sub)}</div>
      </div>`;

    const mixedBtn = buildCard('mixed', '🎲 Mixed', 'A balanced mix of questions', state.qtype === 'mixed', false);
    const typeBtns = allTypesForSubj.map(t => {
      const isLocked = !activeTypes.includes(t.id);
      return buildCard(t.id, t.label, isLocked ? 'Coming soon' : 'Specific question format', state.qtype === t.id, isLocked);
    }).join('');

    app.innerHTML = `
      <div class="text-center mb-8 w-full">
        <div class="badge badge-info mb-2">${stepText}</div>
        <h1 class="font-display text-4xl text-main">Question Format</h1>
        <p class="text-muted text-lg mt-2">${esc(state.topic === 'all' ? 'All Topics' : titleCase(state.topic))} · ${esc(titleCase(state.subject))}</p>
      </div>
      <div class="w-full mb-8" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--space-4);">
        ${mixedBtn} ${typeBtns}
      </div>
      <div class="w-full flex flex-col items-center gap-4" style="max-width: 400px;">
        <button class="btn btn-primary btn-lg w-full hover-lift" ${!state.qtype ? 'disabled' : ''} onclick="window.launchQuiz()">Enter Training Lab →</button>
        <button class="btn btn-ghost" onclick="window.goBack('TOPIC')">← Back to Topics</button>
      </div>`;
  }

  window.pickType = (t) => { state.qtype = t; render(); };
  window.goBack = (phase) => {
    if (phase === 'SUBJECT') { state.subject = ''; state.topic = ''; state.qtype = ''; state.phase = 'SUBJECT'; }
    else if (phase === 'TOPIC') { state.qtype = ''; state.phase = 'TOPIC'; }
    render();
  };

  window.launchQuiz = function () {
    if (!state.qtype) return;
    const levelSlug = state.level.toLowerCase().replace(' ','-');
    const params = new URLSearchParams({ subject: state.subject, level: levelSlug });
    if (state.studentId) params.set('student', state.studentId);
    if (state.topic && state.topic !== 'all') params.set('topic', state.topic);
    if (state.qtype && state.qtype !== 'mixed') params.set('type', state.qtype);
    window.location.href = 'quiz.html?' + params.toString();
  };

  async function init() {
    app.innerHTML = `<div class="flex flex-col items-center justify-center p-10"><div class="spinner-sm mb-4"></div><p class="text-muted font-bold">Loading mission files...</p></div>`;
    try {
      const profile = window.userProfile;
      if (!profile) return;
      
      const sb = await getSupabase();
      const urlParams = new URLSearchParams(window.location.search);
      const urlStudentId = urlParams.get('student');
      
      let query = sb.from('students').select('id, level, selected_subject').eq('parent_id', profile.id);
      if (urlStudentId) {
        query = query.eq('id', urlStudentId);
      }
      
      const { data: student } = await query.limit(1).single();

      state.level = student?.level || 'Primary 4';
      state.tier = profile.subscription_tier || 'trial';
      state.studentId = student?.id || null;

      if (state.studentId) {
        const isJunior = state.level.toLowerCase().includes('primary 1') || state.level.toLowerCase().includes('primary 2');
        
        document.querySelectorAll('.bottom-nav-item').forEach(link => {
          const url = new URL(link.href, window.location.origin);
          url.searchParams.set('student', state.studentId);
          link.href = url.pathname + url.search;
          
          // Hide Exam tab for P1 and P2
          if (isJunior && link.getAttribute('href').includes('exam.html')) {
            link.style.display = 'none';
          }
        });
        
        // Rebalance the nav items if one is hidden
        if (isJunior) {
          const nav = document.getElementById('bottomNav');
          if (nav) nav.style.justifyContent = 'space-evenly';
        }
      }

      if (state.tier === 'single_subject' && student?.selected_subject) {
        state.subject = student.selected_subject.toLowerCase();
        state.phase = 'TOPIC';
      } else {
        state.phase = 'SUBJECT';
      }
      render();
    } catch (err) {
      console.error(err);
      app.innerHTML = `<div class="card p-8 text-center text-danger font-bold">Could not load profile. Please refresh.</div>`;
    }
  }
  
  setTimeout(init, 100);
};
</script>
</body>
</html>
