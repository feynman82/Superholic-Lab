  <style>
    /* ── WIZARD ── */
    .wizard-step { display: none; }
    .wizard-step.is-active { display: block; animation: fadeUp 0.35s ease both; }

    /* ── BREADCRUMB ── */
    .wiz-crumb {
      display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;
      font-size: 0.8125rem; color: var(--text-secondary);
      margin-bottom: var(--space-8);
    }
    .wiz-crumb-sep   { color: var(--glass-border); }
    .wiz-crumb-active { color: var(--mint); font-weight: 600; }

    /* ── SELECTION CARD (subject) ── */
    .sel-card {
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      cursor: pointer;
      transition: all var(--transition-md);
      box-shadow: var(--shadow-neo);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .sel-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(57,255,179,0.03) 0%, transparent 60%);
      pointer-events: none;
    }
    .sel-card:hover {
      border-color: var(--mint);
      transform: translate(-3px,-3px);
      box-shadow: var(--shadow-neo-lg);
    }
    .sel-card.is-sel {
      border-color: var(--mint);
      background: rgba(57,255,179,0.06);
    }
    .sel-card.is-disabled {
      opacity: 0.42; cursor: not-allowed; pointer-events: none;
    }

    /* ── SUBJECT GRID ── */
    .subject-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-4); }
    @media (min-width: 640px) { .subject-grid { grid-template-columns: repeat(3,1fr); } }

    /* ── TOPIC / TYPE GRIDS ── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    @media (min-width: 640px) { .topic-grid { grid-template-columns: repeat(3,1fr); } }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: var(--space-4);
      margin-top: var(--space-4);
    }

    /* ── TOPIC / TYPE BUTTON ── */
    .topic-btn {
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-3);
      cursor: pointer;
      transition: all var(--transition-md);
      font-size: 0.875rem; font-weight: 500; color: var(--cream);
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .topic-btn:hover {
      border-color: var(--mint);
      background: rgba(57,255,179,0.05);
      transform: translate(-1px,-1px);
    }
    .topic-btn:active { transform: translate(0,0); }
    .topic-btn.is-sel {
      border-color: var(--mint);
      background: rgba(57,255,179,0.08);
    }
    .topic-btn.is-all {
      border-color: var(--rose);
      background: rgba(183,110,121,0.07);
    }
    .topic-btn.is-all:hover {
      border-color: var(--rose-dark);
      background: rgba(183,110,121,0.13);
    }
    .topic-btn.is-all.is-sel {
      border-color: var(--mint);
      background: rgba(57,255,179,0.08);
    }

    /* ── SUBJECT ICON ── */
    .subj-icon {
      width: 48px; height: 48px; border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .subj-icon-maths   { background: rgba(126,184,255,0.12); }
    .subj-icon-science { background: rgba(57,255,179,0.10); }
    .subj-icon-english { background: rgba(232,160,255,0.10); }

    /* ── TYPE DOT ── */
    .type-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    /* ── OVERLAY ── */
    .full-overlay {
      position: fixed; inset: 0;
      background: var(--overlay-bg, rgba(15,23,20,0.98));
      backdrop-filter: blur(16px);
      z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: var(--space-4);
    }
  </style>
</head>

  <script src="../js/supabase-client.js"></script>
  <script>
    (function () {
      'use strict';

            // ── Static data maps ─────────────────────────────────────────

      /**
       * Topics available per level+subject key.
       * Empty array = aggregate-only (no topic filter offered).
       * Source: data/questions/ file inventory.
       */
      const TOPIC_MAP = {
        'primary-1:mathematics': ['whole-numbers'],
        'primary-2:mathematics': [],
        'primary-2:english':     [],
        'primary-3:mathematics': ['whole-numbers'],
        'primary-3:science':     ['diversity'],
        'primary-3:english':     ['grammar'],
        'primary-4:mathematics': ['fractions','decimals','geometry','whole-numbers'],
        'primary-4:science':     ['heat','light','magnets','matter'],
        'primary-4:english':     ['grammar','cloze','editing','vocabulary','comprehension'],
        'primary-5:mathematics': [],
        'primary-5:science':     [],
        'primary-5:english':     ['grammar'],
        'primary-6:mathematics': ['fractions'],
        'primary-6:science':     ['cells'],
        'primary-6:english':     ['grammar','cloze','editing'],
      };

      /**
       * Level+subject combos with ≥10 questions in their primary file.
       * Others are "Limited" — still routable but flagged in UI.
       */
      const FULL_COMBOS = new Set([
        'primary-1:mathematics',
        'primary-2:mathematics',
        'primary-2:english',
        'primary-4:mathematics',
        'primary-4:science',
        'primary-4:english',
        'primary-5:mathematics',
        'primary-5:science',
        'primary-6:english',
      ]);

      /** Question types available per subject. */
      const TYPE_MAP = {
        mathematics: ['mcq','short_ans','word_problem'],
        science:     ['mcq','open_ended'],
        english:     ['mcq','cloze','editing'],
      };

      /** Human-readable labels for question types. */
      const TYPE_LABELS = {
        mcq:          'MCQ',
        short_ans:    'Short Answer',
        word_problem: 'Word Problem',
        open_ended:   'Open-Ended',
        cloze:        'Cloze',
        editing:      'Editing',
      };

      /** CSS variable names for type colour dots (never inline hex). */
      const TYPE_COLOURS = {
        mcq:          'var(--type-mcq)',
        short_ans:    'var(--type-short-ans)',
        word_problem: 'var(--type-word-prob)',
        open_ended:   'var(--type-open)',
        cloze:        'var(--type-cloze)',
        editing:      'var(--type-editing)',
      };

      /** Returns eligible subjects for the given student level string. */
      function eligibleSubjects(level) {
        const l = level.toLowerCase();
        if (l.includes('1')) return ['mathematics'];
        if (l.includes('2')) return ['mathematics','english'];
        return ['mathematics','science','english'];
      }

      // ── State machine ─────────────────────────────────────────────
      const state = { phase: 'INIT', level: '', subject: '', tier: '', topic: '', qtype: '' };
      const app = document.getElementById('app');

      function setState(updates) {
        Object.assign(state, updates);
        render();
      }

      function render() {
        if (state.phase === 'SUBJECT') renderSubject();
        else if (state.phase === 'TOPIC') renderTopic();
        else if (state.phase === 'TYPE')  renderType();
      }

      // ── Helpers ───────────────────────────────────────────────────

      /** XSS-safe string escape for insertion into HTML. */
      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      /** "whole-numbers" → "Whole Numbers" */
      function titleCase(slug) {
        return slug.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      /** "Primary 4" → "P4", "primary-4" → "P4" */
      function shortLevel(level) {
        return level.replace(/primary[- ]/i,'P').replace(/secondary[- ]/i,'S');
      }

      /** Subject colour CSS variable by name. */
      function subjColour(subj) {
        if (subj === 'mathematics') return 'var(--maths-colour)';
        if (subj === 'science')     return 'var(--science-colour)';
        return 'var(--english-colour)';
      }

      // ── Phase renderers ──────────────────────────────────────────

      /**
       * SUBJECT phase: show eligible subject cards filtered by level + tier.
       * single_subject tier is auto-routed in init() — this phase
       * is only shown for all_subjects / family / trial tiers.
       */
      function renderSubject() {
        const eligible  = eligibleSubjects(state.level);
        const allSubjs  = ['mathematics','science','english'];
        const levelSlug = state.level.toLowerCase().replace(' ','-');

        const subjectMeta = {
          mathematics: {
            label:      'Mathematics',
            iconClass:  'subj-icon-maths',
            icon:       `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true"><path d="M8 14h12M14 8v12" stroke="var(--maths-colour)" stroke-width="2.5" stroke-linecap="round"/><circle cx="14" cy="14" r="6" stroke="var(--maths-colour)" stroke-width="1.5"/></svg>`,
            lockedMsg:  '',
          },
          science: {
            label:      'Science',
            iconClass:  'subj-icon-science',
            icon:       `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true"><path d="M10 4v8l-4 8a2 2 0 001.8 2.9h12.4A2 2 0 0022 20l-4-8V4" stroke="var(--science-colour)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 4h10" stroke="var(--science-colour)" stroke-width="1.75" stroke-linecap="round"/><circle cx="12" cy="18" r="1.5" fill="var(--science-colour)" opacity="0.6"/></svg>`,
            lockedMsg:  'Starts at Primary 3',
          },
          english: {
            label:      'English',
            iconClass:  'subj-icon-english',
            icon:       `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true"><rect x="5" y="4" width="18" height="20" rx="3" stroke="var(--english-colour)" stroke-width="1.75"/><path d="M9 9h10M9 13h10M9 17h6" stroke="var(--english-colour)" stroke-width="1.5" stroke-linecap="round"/></svg>`,
            lockedMsg:  '',
          },
        };

        const cards = allSubjs.map(subj => {
          const isLevelEligible = eligible.includes(subj);
          const isTierLocked    = state.tier === 'single_subject' && subj !== state.subject;
          const isDisabled      = !isLevelEligible || isTierLocked;

          const key        = levelSlug + ':' + subj;
          const topicCount = (TOPIC_MAP[key] || []).length;
          const hasFull    = FULL_COMBOS.has(key);
          const m          = subjectMeta[subj];
          const colour     = subjColour(subj);

          const lockedReason = isTierLocked ? 'Not in your plan' : m.lockedMsg;

          let badges = '';
          if (isDisabled) {
            badges = `<span class="badge badge-standard">🔒 ${esc(lockedReason || 'Not available')}</span>`;
          } else {
            badges  = topicCount > 0
              ? `<span class="badge badge-info">${topicCount} topics</span>`
              : `<span class="badge badge-info">Mixed</span>`;
            badges += hasFull
              ? ` <span class="badge badge-success">Ready</span>`
              : ` <span class="badge badge-amber">Limited</span>`;
          }

          return `
            <div class="sel-card${isDisabled ? ' is-disabled' : ''}"
                 role="button" tabindex="${isDisabled ? -1 : 0}"
                 aria-label="${esc(m.label)}"${isDisabled ? ' aria-disabled="true"' : ''}
                 ${isDisabled ? '' : `onclick="pickSubject('${subj}')"`}>
              <div class="flex items-center gap-4 mb-4">
                <div class="subj-icon ${m.iconClass}">${m.icon}</div>
                <div>
                  <h3 class="font-bold" style="color:${colour}; margin:0;">${esc(m.label)}</h3>
                  <p class="text-xs text-secondary" style="margin:0;">${esc(shortLevel(state.level))}</p>
                </div>
              </div>
              <div class="flex gap-2 flex-wrap">${badges}</div>
            </div>`;
        }).join('');

        app.innerHTML = `
          <div class="wizard-step is-active">
            <div class="wiz-crumb">
              <span class="wiz-crumb-active">${esc(state.level)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span>Subject</span>
            </div>
            <h1 class="mb-2">Choose a Subject</h1>
            <p class="text-secondary mb-8">Personalised practice for ${esc(state.level)}</p>
            <div class="subject-grid">${cards}</div>
          </div>`;
      }

      window.pickSubject = function (subj) {
        setState({ subject: subj, topic: '', qtype: '', phase: 'TOPIC' });
      };

      /**
       * TOPIC phase: show "All Topics" + per-topic buttons.
       * "All Topics" routes to the aggregate file (no topic URL param).
       */
      function renderTopic() {
        const levelSlug = state.level.toLowerCase().replace(' ','-');
        const key       = levelSlug + ':' + state.subject;
        const topics    = TOPIC_MAP[key] || [];
        const hasFull   = FULL_COMBOS.has(key);
        const label     = state.subject.charAt(0).toUpperCase() + state.subject.slice(1);
        const colour    = subjColour(state.subject);

        const allSelClass  = state.topic === 'all' ? ' is-sel' : '';
        const limitedBadge = hasFull ? '' : `<span class="badge badge-amber" style="margin-left:var(--space-2);">Limited</span>`;
        const allTopicBtn  = `
          <button class="topic-btn is-all${allSelClass}"
                  style="grid-column:1/-1;"
                  onclick="pickTopic('all')">
            <span class="font-bold">📚 All Topics</span>${limitedBadge}
          </button>`;

        const topicBtns = topics.map(t => {
          const selClass = state.topic === t ? ' is-sel' : '';
          return `<button class="topic-btn${selClass}" onclick="pickTopic('${esc(t)}')">${esc(titleCase(t))}</button>`;
        }).join('');

        const backBtn = state.tier !== 'single_subject'
          ? `<button class="btn btn-ghost btn-sm" style="margin-top:var(--space-8);" onclick="goBack('SUBJECT')">← Back</button>`
          : '';

        app.innerHTML = `
          <div class="wizard-step is-active">
            <div class="wiz-crumb">
              <span>${esc(state.level)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span class="wiz-crumb-active" style="color:${colour};">${esc(label)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span>Topic</span>
            </div>
            <h1 class="mb-2">${esc(label)}</h1>
            <p class="text-secondary mb-6">Select a topic to practise</p>
            <div class="topic-grid">
              ${allTopicBtn}
              ${topicBtns}
            </div>
            <div class="mt-8">
              <button class="btn btn-primary btn-lg w-full"
                      ${!state.topic ? 'disabled' : ''}
                      onclick="goToType()">
                Choose Question Type →
              </button>
            </div>
            ${backBtn}
          </div>`;
      }

      window.pickTopic = function (t) {
        setState({ topic: t });
      };

      window.goToType = function () {
        if (!state.topic) return;
        setState({ qtype: '', phase: 'TYPE' });
      };

      /**
       * TYPE phase: show available question types for the chosen subject.
       */
      function renderType() {
        const label     = state.subject.charAt(0).toUpperCase() + state.subject.slice(1);
        const topicLbl  = state.topic === 'all' ? 'All Topics' : titleCase(state.topic);
        const types     = TYPE_MAP[state.subject] || [];
        const colour    = subjColour(state.subject);

        const mixedSelClass = state.qtype === 'mixed' ? ' is-sel' : '';
        const mixedBtn = `
          <button class="topic-btn is-all${mixedSelClass}"
                  style="grid-column:1/-1;"
                  onclick="pickType('mixed')">
            <span class="font-bold">🎲 Mixed (All Types)</span>
          </button>`;

        const typeBtns = types.map(t => {
          const selClass = state.qtype === t ? ' is-sel' : '';
          const dot = `<span class="type-dot" style="background:${TYPE_COLOURS[t]};"></span>`;
          return `
            <button class="topic-btn${selClass}" onclick="pickType('${esc(t)}')">
              <div class="flex items-center justify-center gap-2">
                ${dot}<span>${esc(TYPE_LABELS[t] || t)}</span>
              </div>
            </button>`;
        }).join('');

        app.innerHTML = `
          <div class="wizard-step is-active">
            <div class="wiz-crumb">
              <span>${esc(state.level)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span style="color:${colour};">${esc(label)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span>${esc(topicLbl)}</span>
              <span class="wiz-crumb-sep">›</span>
              <span class="wiz-crumb-active">Type</span>
            </div>
            <h1 class="mb-2">Question Type</h1>
            <p class="text-secondary mb-6">
              ${esc(state.level)} · ${esc(label)} · ${esc(topicLbl)}
            </p>
            <div class="type-grid">
              ${mixedBtn}
              ${typeBtns}
            </div>
            <div class="mt-8">
              <button class="btn btn-primary btn-lg w-full"
                      ${!state.qtype ? 'disabled' : ''}
                      onclick="launchQuiz()">
                Start Quiz →
              </button>
            </div>
            <button class="btn btn-ghost btn-sm" style="margin-top:var(--space-4);"
                    onclick="goBack('TOPIC')">← Back</button>
          </div>`;
      }

      window.pickType = function (t) {
        setState({ qtype: t });
      };

      window.goBack = function (phase) {
        if (phase === 'SUBJECT') setState({ subject: '', topic: '', qtype: '', phase: 'SUBJECT' });
        else if (phase === 'TOPIC') setState({ qtype: '', phase: 'TOPIC' });
      };

      /**
       * Assembles quiz.html URL and navigates to the quiz engine.
       * quiz.js handles file resolution, question rendering, scoring, and Supabase save.
       */
      window.launchQuiz = function () {
        if (!state.qtype) return;

        const levelSlug = state.level.toLowerCase().replace(' ','-');
        const params    = new URLSearchParams({ subject: state.subject, level: levelSlug });

        // P1 Maths has no aggregate — always route to the only topic file
        if (levelSlug === 'primary-1' && state.subject === 'mathematics') {
          params.set('topic', 'whole-numbers');
        } else if (state.topic && state.topic !== 'all') {
          params.set('topic', state.topic);
        }

        if (state.qtype && state.qtype !== 'mixed') {
          params.set('type', state.qtype);
        }

        window.location.href = 'quiz.html?' + params.toString();
      };

      // ── Init ──────────────────────────────────────────────────────
      /**
       * Fetches session, subscription profile, and student record.
       * Drives initial wizard phase based on subscription tier.
       */
      async function init() {
        try {
          const sb = await getSupabase();
          const { data: { session } } = await sb.auth.getSession();
          if (!session) {
            window.location.href = 'login.html';
            return;
          }

          // Auth-aware navbar
          const actionsEl = document.getElementById('navbar-actions');
          const navDash   = document.getElementById('navDashboard');
          if (actionsEl) {
            actionsEl.innerHTML =
              '<a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>'
              + '<button class="btn btn-primary btn-sm" id="navSignOut">Sign Out</button>';
            document.getElementById('navSignOut').addEventListener('click', () => {
              sb.auth.signOut().then(() => window.location.reload());
            });
          }
          if (navDash) navDash.hidden = false;

          const [{ data: student }, { data: profile }] = await Promise.all([
            sb.from('students').select('level, selected_subject').eq('parent_id', session.user.id).maybeSingle(),
            sb.from('profiles').select('subscription_tier').eq('id', session.user.id).maybeSingle(),
          ]);

          const level = (student && student.level)             || 'Primary 4';
          const tier  = (profile && profile.subscription_tier) || 'trial';

          document.getElementById('ov-load').hidden = true;

          // single_subject tier: skip subject selection — jump straight to topic picker
          if (tier === 'single_subject' && student && student.selected_subject) {
            setState({
              level, tier,
              subject: student.selected_subject.toLowerCase(),
              phase: 'TOPIC',
            });
          } else {
            setState({ level, tier, phase: 'SUBJECT' });
          }

        } catch (err) {
          console.error('[subjects] init error:', err);
          document.getElementById('ov-load').hidden = true;
          app.innerHTML = `
            <div class="card" style="padding:var(--space-8); text-align:center;">
              <p class="text-danger mb-4">Could not load your profile. Please try again.</p>
              <button class="btn btn-primary" onclick="location.reload()">Retry</button>
            </div>`;
        }
      }

      init();

    })();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* ── 1. Dropdown Toggle Logic ── */
      const toggle = document.getElementById('navToggle');
      const dropdown = document.getElementById('navDropdown');
      
      if (toggle && dropdown) {
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.classList.toggle('is-open');
          toggle.classList.toggle('is-active'); 
        });
        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target) && !toggle.contains(e.target)) {
            dropdown.classList.remove('is-open');
            toggle.classList.remove('is-active');
          }
        });
      }

      /* ── 2. Master Auth & Layout Logic ── */
      getSupabase().then(async function(sb) {
        try {
          const { data: { session } } = await sb.auth.getSession();
          const body = document.getElementById('mainBody');
          const bottomNav = document.getElementById('bottomNav');
          const authContainer = document.getElementById('auth-header-container');
          const navLinks = document.getElementById('navLinks');

          if (session) {
            // 1. Update Auth Buttons (Applies to ALL pages)
            if (authContainer) {
              authContainer.innerHTML = '<a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>';
            }

            if (navLinks && !document.getElementById('navSignOut')) {
              const signOut = document.createElement('a');
              signOut.id = "navSignOut";
              signOut.href = "#";
              signOut.textContent = "Sign Out";
              signOut.style.color = "var(--rose)";
              signOut.onclick = async (e) => { 
                e.preventDefault();
                await sb.auth.signOut(); 
                window.location.href = '../index.html'; 
              };
              navLinks.appendChild(signOut);
              
              const signUpLink = document.getElementById('navSignUp');
              if (signUpLink) signUpLink.remove();
            }

            // 2. Layout Shift (ONLY apply padding if this page has a sidebar)
            if (bottomNav) {
              body.classList.add('is-logged-in', 'has-bottom-nav');
              bottomNav.hidden = false;
            }

          } else {
            // User is Guest: Ensure app-specific layout shifts are disabled
            if (body) body.classList.remove('is-logged-in', 'has-bottom-nav');
            if (bottomNav) bottomNav.hidden = true;
          }
        } catch (e) {
          console.error('Master auth script failed:', e);
        }
      });
    });
  </script>
