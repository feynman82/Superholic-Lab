<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Superholic Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../assets/favicon.ico" />
</head>
<body>
  <header class="navbar is-scrolled">
    <div class="container">
      <nav class="navbar-inner">
        <a href="../index.html" class="navbar-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="8" fill="#4338ca"/>
            <path d="M8 14.5L12.5 19L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Superholic Lab
        </a>
        <div class="navbar-actions">
          <a href="signup.html" class="btn btn-primary btn-sm">Start Free Trial</a>
        </div>
      </nav>
    </div>
  </header>

  <div style="background: var(--hero-gradient); padding: var(--space-10) 0 var(--space-14); position:relative; overflow:hidden;">
    <div class="container" style="position:relative;z-index:1;text-align:center;">
      <h1 class="animate-in delay-1" style="color:white;">Contact Us</h1>
      <p class="animate-in delay-2" style="color:rgba(255,255,255,0.82);">We'd love to hear from you</p>
    </div>
    <div class="wave-divider" aria-hidden="true">
      <svg viewBox="0 0 1440 70" preserveAspectRatio="none">
        <path d="M0,40 C360,70 720,10 1080,40 C1260,55 1380,30 1440,40 L1440,70 L0,70 Z" fill="var(--surface)"/>
      </svg>
    </div>
  </div>

  <main style="padding: var(--space-10) 0 var(--space-16);">
    <div class="container">
      <div class="card no-hover" style="max-width:560px; margin:0 auto;">
        <div class="card-body">
          <!-- PLACEHOLDER: Task 4.4 — contact form (Formspree or Web3Forms) -->
          <div class="alert alert-info">
            Contact form coming in Task 4.4. Will use Formspree or Web3Forms endpoint.
          </div>
          <div class="form-group mt-6">
            <label class="form-label">Your name</label>
            <input type="text" class="form-input" placeholder="e.g. Sarah Tan" disabled />
          </div>
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input type="email" class="form-input" placeholder="hello@example.com" disabled />
          </div>
          <div class="form-group">
            <label class="form-label">Message</label>
            <textarea class="form-textarea" placeholder="Your message here…" disabled></textarea>
          </div>
          <button class="btn btn-primary btn-full" disabled>Send Message (coming soon)</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Superholic Lab. All rights reserved. 🇸🇬 Made in Singapore</p>
        <div class="flex gap-4">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
